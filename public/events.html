<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events - Duck Playspace</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .dashboard-wrapper {
      width: 100vw;
      margin-left: calc(-50vw + 50%);
      padding: 20px;
    }

    .dates-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
    }

    .date-card {
      background: white;
      border: 2px solid #667eea;
      border-radius: 10px;
      padding: 20px;
    }

    .date-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid #667eea;
    }

    .date-title {
      font-size: 18px;
      font-weight: 700;
      color: #667eea;
    }

    .date-status {
      display: flex;
      gap: 20px;
      font-size: 12px;
    }

    .status-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .status-label {
      font-weight: 600;
      color: #666;
    }

    .status-value {
      color: #667eea;
      font-weight: 700;
      font-size: 14px;
    }

    .date-actions {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .btn-copy-emails {
      padding: 8px 16px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
    }

    .btn-copy-emails:hover {
      background: #764ba2;
    }

    .venue-stats {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
      display: flex;
      gap: 15px;
      align-items: flex-end;
    }

    .venue-stat {
      text-align: center;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .venue-name {
      font-weight: 600;
      color: #333;
      font-size: 12px;
      order: 2;
    }

    .venue-bar {
      height: 80px;
      background: #e0e0e0;
      border-radius: 4px;
      overflow: hidden;
      order: 1;
    }

    .venue-fill {
      height: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      color: white;
      font-size: 12px;
      font-weight: 600;
      padding-bottom: 4px;
    }

    .venue-fill.intensity-1 {
      background: #e0f0ff;
      color: #0066cc;
    }

    .venue-fill.intensity-2 {
      background: #b3d9ff;
      color: #0052a3;
    }

    .venue-fill.intensity-3 {
      background: #4d94ff;
      color: white;
    }

    .venue-fill.intensity-4 {
      background: #0052cc;
      color: white;
    }

    .venue-count {
      font-size: 12px;
      color: #666;
      order: 3;
    }

    .slots-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .gender-column {
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      padding: 15px;
      background: #f9f9f9;
    }

    .gender-column.woman {
      background: #ffe0e0;
      border-color: #ff6b9d;
    }

    .gender-column.man {
      background: #e3f2fd;
      border-color: #667eea;
    }

    .gender-column-title {
      font-size: 14px;
      font-weight: 700;
      color: #333;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid #667eea;
    }

    .gender-column.woman .gender-column-title {
      border-bottom-color: #ff6b9d;
      color: #c2185b;
    }

    .gender-column.man .gender-column-title {
      color: #1565c0;
    }

    .primary-slots {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 15px;
    }

    .primary-slot {
      background: white;
      border: 2px dashed #667eea;
      border-radius: 8px;
      padding: 12px;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.3s;
      color: #999;
      font-size: 12px;
    }

    .primary-slot.filled {
      border-style: solid;
      background: #e3f2fd;
      flex-direction: column;
      align-items: flex-start;
    }

    .gender-column.woman .primary-slot.filled {
      background: #ffe0e0;
      border-color: #ff6b9d;
    }

    .gender-column.man .primary-slot.filled {
      background: #e3f2fd;
      border-color: #667eea;
    }

    .primary-slot.compatibility-issue {
      border: 3px solid #ff6b6b;
      background: #ffe0e0 !important;
      box-shadow: 0 0 8px rgba(255, 107, 107, 0.3);
    }

    .slot-person {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
      margin-bottom: 8px;
    }

    .slot-person-name {
      font-weight: 600;
      color: #333;
      font-size: 12px;
    }

    .slot-person-details {
      font-size: 11px;
      color: #666;
    }

    .slot-remove {
      padding: 4px 8px;
      background: #ff6b6b;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
    }

    .slot-remove:hover {
      background: #c92a2a;
    }

    .backup-people {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .backup-title {
      font-size: 12px;
      font-weight: 600;
      color: #666;
      margin-top: 10px;
      margin-bottom: 10px;
    }

    .person-card {
      background: white;
      padding: 12px;
      border-radius: 8px;
      border-left: 4px solid #667eea;
      font-size: 11px;
      position: relative;
      cursor: pointer;
      transition: all 0.2s;
    }

    .person-card:hover {
      background: #f0f3ff;
    }

    .person-card.man {
      border-left-color: #1e3a8a;
      background: #dbeafe;
    }

    .person-card.man:hover {
      background: #bfdbfe;
    }

    .person-card.woman {
      border-left-color: #be185d;
      background: #fce7f3;
    }

    .person-card.woman:hover {
      background: #fbcfe8;
    }

    .person-card.nonbinary {
      border-left-color: #6b21a8;
      background: #e9d5ff;
    }

    .person-card.nonbinary:hover {
      background: #ddd6fe;
    }

    .person-card.other {
      border-left-color: #b45309;
      background: #fed7aa;
    }

    .person-card.other:hover {
      background: #fdba74;
    }

    .person-card.not-staying {
      border-left-color: #6b7280;
      background: #f3f4f6;
    }

    .person-card.not-staying:hover {
      background: #e5e7eb;
    }

    .person-card.age-mismatch {
      border-left-color: #ff6b6b;
      background: #ffe0e0;
    }

    .person-info {
      flex: 1;
      margin-bottom: 8px;
    }

    .person-name {
      font-weight: 600;
      color: #333;
      margin-bottom: 4px;
    }

    .person-details {
      color: #666;
      font-size: 10px;
      line-height: 1.4;
      margin-bottom: 4px;
    }

    .person-meta {
      color: #666;
      font-size: 10px;
      line-height: 1.4;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .meta-item {
      word-break: break-word;
    }

    .meta-label {
      font-weight: 600;
      color: #333;
    }

    .person-card-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .btn-assign {
      padding: 4px 8px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 10px;
      font-weight: 600;
    }

    .btn-assign:hover {
      background: #764ba2;
    }

    .person-controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #ddd;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .control-label {
      font-size: 10px;
      font-weight: 600;
      color: #666;
    }

    .payment-group {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .payment-check {
      display: flex;
      align-items: center;
      gap: 4px;
      flex: 1;
    }

    .payment-check input[type="checkbox"] {
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .payment-check label {
      font-size: 10px;
      cursor: pointer;
      margin: 0;
    }

    .payment-amount {
      flex: 1;
    }

    .payment-amount input {
      width: 100%;
      padding: 4px;
      border: 1px solid #ddd;
      border-radius: 3px;
      font-size: 10px;
    }

    .availability-select {
      padding: 4px;
      border: 1px solid #ddd;
      border-radius: 3px;
      font-size: 10px;
      background: white;
    }

    .availability-select.not-attending {
      background: #ffe0e0;
      color: #c2185b;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #667eea;
      font-size: 16px;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .no-dates {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .event-group {
      margin-bottom: 20px;
      border: 2px solid #667eea;
      border-radius: 10px;
      overflow: hidden;
    }

    .event-group-header {
      background: #667eea;
      color: white;
      padding: 15px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 16px;
      user-select: none;
      transition: background 0.3s;
    }

    .event-group-header:hover {
      background: #764ba2;
    }

    .event-group-toggle {
      display: inline-block;
      transition: transform 0.3s;
      font-size: 14px;
    }

    .event-group-toggle.collapsed {
      transform: rotate(-90deg);
    }

    .event-group-content {
      padding: 20px;
      background: white;
      max-height: 2000px;
      overflow: hidden;
      transition: max-height 0.3s;
    }

    .event-group-content.collapsed {
      max-height: 0;
      padding: 0 20px;
    }

    .date-card {
      background: white;
      border: 2px solid #f0f0f0;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 15px;
    }

    .date-card:last-child {
      margin-bottom: 0;
    }

    .person-link {
      cursor: pointer;
      color: #667eea;
      font-weight: 600;
      text-decoration: none;
      border-bottom: 1px dashed #667eea;
      transition: all 0.2s;
    }

    .person-link:hover {
      color: #764ba2;
      border-bottom-color: #764ba2;
    }

    .profile-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .profile-modal.active {
      display: flex;
    }

    .profile-modal-content {
      background: white;
      border-radius: 10px;
      max-width: 700px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      padding: 30px;
    }

    .profile-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 2px solid #667eea;
    }

    .profile-title {
      font-size: 24px;
      font-weight: 700;
      color: #333;
    }

    .profile-close {
      background: none;
      border: none;
      font-size: 28px;
      cursor: pointer;
      color: #999;
      padding: 0;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .profile-close:hover {
      color: #333;
    }

    .profile-section {
      margin-bottom: 20px;
    }

    .profile-section-title {
      font-weight: 700;
      color: #667eea;
      margin-bottom: 10px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .profile-field {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .profile-field-label {
      font-weight: 600;
      color: #666;
      min-width: 150px;
    }

    .profile-field-value {
      color: #333;
      text-align: right;
      flex: 1;
      margin-left: 15px;
      word-break: break-word;
    }

    .profile-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      background: #667eea;
      color: white;
      margin: 2px;
    }

    .profile-bio {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 8px;
      line-height: 1.6;
      color: #666;
      font-size: 12px;
      margin: 10px 0;
    }

    .profile-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .profile-tag {
      display: inline-block;
      padding: 4px 8px;
      background: #f0f0f0;
      border-radius: 4px;
      font-size: 10px;
      color: #666;
    }
    .responsiveness-stars { display: inline-flex; gap: 2px; align-items: center; } 
    .star { color: #ffc107; font-size: 14px; line-height: 1; } 
    .star.empty { color: #ddd; } 
    .responsiveness-label { font-size: 11px; color: #666; margin-left: 5px; }
  </style>
</head>
<body>
  <div class="page-container">
    <div class="page-bg grid-bg"></div>

    <div class="container">
      <header class="header">
        <div>
          <div style="display: flex; align-items: center; gap: 1rem;">
            <img src="images/DDA-logo.png" alt="DDA Logo" style="height: 50px; width: auto;">
            <h1>Duck Playspace</h1>
          </div>
          <div class="header-subtitle">Events Management</div>
        </div>
        <button id="logoutBtn" class="btn btn-logout">Logout</button>
      </header>

      <nav class="navbar">
        <a href="/home" class="nav-link">Home</a>
        <a href="/poll" class="nav-link">Polls</a>
        <a href="/upload-data" class="nav-link">Upload Data</a>
        <a href="/data-filters" class="nav-link">Data</a>
        <a href="/groups" class="nav-link">Groups</a>
        <a href="/events" class="nav-link active">Events</a>
        <a href="/dashboard" class="nav-link">Dashboard</a>
      </nav>

      <main class="content">
        <div class="dashboard-wrapper">
          <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Loading events...</p>
          </div>

          <div id="datesContent" style="display: none;">
            <div class="dates-container" id="datesContainer"></div>
            <div class="no-dates" id="noDates" style="display: none;">
              No valid events found. Need minimum 6 women + 6 men for regular groups, or 12 people for LGBTQ+.
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Person Profile Modal -->
  <div class="profile-modal" id="personProfileModal">
    <div class="profile-modal-content">
      <div class="profile-header">
        <div class="profile-title" id="profileName">Name</div>
        <button class="profile-close" onclick="closePersonProfile()">✕</button>
      </div>
      <div id="profileContent"></div>
    </div>
  </div>

  <script>
    let allData = [];
    let dates = {};
    let selections = {};
    let personData = {}; // { email: { paid: boolean, amount: number, availability: string } }

    async function loadDates() {
      try {
        const response = await fetch('/api/dashboard-data');
        allData = await response.json();

        generateDates();
        displayDates();

        document.getElementById('loading').style.display = 'none';
        document.getElementById('datesContent').style.display = 'block';
      } catch (err) {
        console.error('Failed to load dates:', err);
      }
    }

    function generateDates() {
      const dateGroups = {
        'Mono Long-Term': [],
        'Mono Casual': [],
        'Poly/ENM Long-Term': [],
        'Poly/ENM Casual': [],
        'Friends': [],
        'LGBTQ+': []
      };

      // Categorize people
      allData.forEach(person => {
        const relationshipStyle = person['Relationship Style'] || '';
        const mainIntention = person['Main Intention'] || '';
        const gender = person['Gender'] || '';
        const sexuality = person['Sexuality'] || '';

        const isMono = relationshipStyle.toLowerCase().includes('mono');
        const isPoly = relationshipStyle.toLowerCase().includes('poly') || relationshipStyle.toLowerCase().includes('enm');
        const isLongTerm = mainIntention.toLowerCase().includes('long');
        const isCasual = mainIntention.toLowerCase().includes('casual');
        const isFriends = mainIntention.toLowerCase().includes('friend');
        const isLGBTQ = gender !== 'Man' && gender !== 'Woman' && gender !== '' || sexuality.toLowerCase().includes('gay') || sexuality.toLowerCase().includes('lesbian') || sexuality.toLowerCase().includes('bi');

        if (isMono && isLongTerm) dateGroups['Mono Long-Term'].push(person);
        if (isMono && isCasual) dateGroups['Mono Casual'].push(person);
        if (isPoly && isLongTerm) dateGroups['Poly/ENM Long-Term'].push(person);
        if (isPoly && isCasual) dateGroups['Poly/ENM Casual'].push(person);
        if (isFriends) dateGroups['Friends'].push(person);
        if (isLGBTQ) dateGroups['LGBTQ+'].push(person);
      });

      // Check which groups qualify as dates
      Object.entries(dateGroups).forEach(([groupName, people]) => {
        if (groupName === 'LGBTQ+') {
          if (people.length >= 12) {
            dates[groupName] = people;
          }
        } else {
          const womenCount = people.filter(p => p['Gender'] === 'Woman').length;
          const menCount = people.filter(p => p['Gender'] === 'Man').length;
          if (womenCount >= 6 && menCount >= 6) {
            dates[groupName] = people;
          }
        }
      });
    }

    function displayDates() {
      const container = document.getElementById('datesContainer');
      const noDates = document.getElementById('noDates');

      if (Object.keys(dates).length === 0) {
        noDates.style.display = 'block';
        return;
      }

      container.innerHTML = '';

      Object.entries(dates).forEach(([dateName, people]) => {
        const eventGroup = document.createElement('div');
        eventGroup.className = 'event-group';

        const womenCount = people.filter(p => p['Gender'] === 'Woman').length;
        const menCount = people.filter(p => p['Gender'] === 'Man').length;
        const totalCount = people.length;

        // Create collapsible header
        const groupHeader = document.createElement('div');
        groupHeader.className = 'event-group-header';
        groupHeader.innerHTML = `<span class="event-group-toggle">▼</span> ${dateName} (${womenCount}W / ${menCount}M / ${totalCount} total)`;
        groupHeader.onclick = () => toggleEventGroup(eventGroup);
        eventGroup.appendChild(groupHeader);

        // Create content container
        const contentDiv = document.createElement('div');
        contentDiv.className = 'event-group-content';

        // Create the date card with all content
        const card = document.createElement('div');
        card.className = 'date-card';

        const headerHTML = `
          <div class="date-header">
            <div class="date-title">${dateName}</div>
            <div class="date-status">
              <div class="status-item">
                <span class="status-label">Women</span>
                <span class="status-value">${womenCount}</span>
              </div>
              <div class="status-item">
                <span class="status-label">Men</span>
                <span class="status-value">${menCount}</span>
              </div>
              <div class="status-item">
                <span class="status-label">Total</span>
                <span class="status-value">${totalCount}</span>
              </div>
            </div>
          </div>
        `;

        const venueStats = getVenueStats(people);
        const venueHTML = createVenueStatsHTML(venueStats);

        const actionsHTML = `
          <div class="date-actions">
            <button class="btn-copy-emails" onclick="copyEmails('${dateName}')">📋 Copy Primary Emails</button>
          </div>
        `;

        const slotsHTML = createSlotsHTML(dateName, people);

        card.innerHTML = headerHTML + actionsHTML + venueHTML + slotsHTML;
        contentDiv.appendChild(card);
        eventGroup.appendChild(contentDiv);
        container.appendChild(eventGroup);
      });
    }

    function getVenueStats(people) {
      const venues = { 'Bar': 0, 'Café': 0, 'Park': 0, 'Boulder Hall': 0 };

      people.forEach(person => {
        const prefs = person['Venue Preferences'] || '';
        Object.keys(venues).forEach(venue => {
          if (prefs.toLowerCase().includes(venue.toLowerCase())) {
            venues[venue]++;
          }
        });
      });

      return venues;
    }

    function createVenueStatsHTML(venues) {
      // Sort by vote count descending
      const sortedVenues = Object.entries(venues).sort((a, b) => b[1] - a[1]);
      const maxVotes = Math.max(...sortedVenues.map(v => v[1]), 1);

      let html = '<div class="venue-stats">';

      sortedVenues.forEach(([venue, count], index) => {
        const percentage = (count / maxVotes) * 100;
        // Assign intensity: 1st place = intensity-4 (darkest), last = intensity-1 (lightest)
        const intensityRank = Math.max(1, Math.ceil((sortedVenues.length - index) * 4 / sortedVenues.length));
        const intensityClass = `intensity-${intensityRank}`;

        html += `
          <div class="venue-stat">
            <div class="venue-bar">
              <div class="venue-fill ${intensityClass}" style="height: ${percentage}%">
                ${count}
              </div>
            </div>
            <div class="venue-name">${venue}</div>
            <div class="venue-count">${count} votes</div>
          </div>
        `;
      });

      html += '</div>';
      return html;
    }

    function createSlotsHTML(dateName, people) {
      const women = people.filter(p => p['Gender'] === 'Woman');
      const men = people.filter(p => p['Gender'] === 'Man');
      const others = people.filter(p => p['Gender'] !== 'Woman' && p['Gender'] !== 'Man');

      let html = '<div class="slots-container">';

      // Women column
      html += createGenderColumn(dateName, 'Woman', women);

      // Men column
      html += createGenderColumn(dateName, 'Man', men);

      html += '</div>';

      // Others if LGBTQ+
      if (others.length > 0) {
        html += createGenderColumn(dateName, 'Other', others);
      }

      return html;
    }

    function createGenderColumn(dateName, gender, people) {
      const genderClass = gender === 'Woman' ? 'woman' : gender === 'Man' ? 'man' : 'other';
      let html = `<div class="gender-column ${genderClass}">
        <div class="gender-column-title">${gender}</div>
        <div class="primary-slots">`;

      for (let i = 0; i < 4; i++) {
        const slotKey = `${dateName}:${gender}:${i}`;
        const person = selections[slotKey];

        if (person) {
          const ageIssues = checkAgeCompatibilityInSlots(dateName, gender, person);
          const hasIssue = ageIssues.length > 0;
          const issueClass = hasIssue ? 'compatibility-issue' : '';
          const issueTitle = hasIssue ? `⚠️ Age mismatch with: ${ageIssues.join(', ')}` : '';

          html += `
            <div class="primary-slot filled ${issueClass}" title="${issueTitle}">
              <div class="slot-person">
                <div class="slot-person-name person-link" onclick="openPersonProfile('${(person.Email || '').replace(/'/g, "\\'")}')">${person.Name || person.Email}</div>
                <div class="slot-person-details">${person.Age} yrs ${hasIssue ? '⚠️' : ''}</div>
              </div>
              <button class="slot-remove" onclick="removeFromSlot('${slotKey}')">Remove</button>
            </div>
          `;
        } else {
          html += `<div class="primary-slot">+ Empty slot</div>`;
        }
      }

      html += '</div><div class="backup-title">Backups:</div><div class="backup-people">';

      // Sort people by age
      const sortedPeople = [...people].sort((a, b) => {
        const ageA = parseInt(a['Age']) || 0;
        const ageB = parseInt(b['Age']) || 0;
        return ageA - ageB;
      });

      sortedPeople.forEach(person => {
        const email = person['Email'] || '';
        const isSlotted = Object.values(selections).some(p => p && p['Email'] === email);

        if (!isSlotted) {
          const age = person['Age'] || '?';
          const prefMin = person['Preferred Age Min'] || person['Age Preference Min'] || '?';
          const prefMax = person['Preferred Age Max'] || person['Age Preference Max'] || '?';
          const sexuality = person['Sexuality'] || person['sexuality'] || '?';
          const language = person['Language'] || person['Languages'] || person['language'] || person['languages'] || '?';
          const mainIntention = person['Main Intention'] || person['main intention'] || person['Intention'] || person['intention'] || '?';
          const relationshipStyle = person['Relationship Style'] || person['relationship style'] || person['Relationship'] || person['relationship'] || '?';
          const bezirk = person['Bezirk'] || person['bezirk'] || '?';
          const stayingInBerlin = person['Staying in Berlin'] || person['staying in berlin'] || 'Yes';
          const isAgeMismatch = checkAgeMismatch(person);

          // Determine color class based on gender
          let genderClass = '';
          const personGender = person['Gender'] || '';
          if (personGender === 'Man') {
            genderClass = 'man';
          } else if (personGender === 'Woman') {
            genderClass = 'woman';
          } else if (personGender === 'Non-binary') {
            genderClass = 'nonbinary';
          } else if (personGender && personGender !== 'Woman' && personGender !== 'Man') {
            genderClass = 'other';
          }

          // Check if not staying in Berlin
          const isNotStaying = stayingInBerlin.toLowerCase() === 'no';
          const notStayingClass = isNotStaying ? 'not-staying' : '';
          const mismatchClass = isAgeMismatch ? 'age-mismatch' : '';

          // Override color if not staying
          const colorClass = isNotStaying ? notStayingClass : genderClass;

          const starRating = calculateResponsivenessStar(email);

          html += `
            <div class="person-card ${colorClass} ${mismatchClass}">
              <div class="person-info">
                <div class="person-name person-link" onclick="openPersonProfile('${email.replace(/'/g, "\\'")}')">${person.Name || email}</div>
                <div>${renderStars(starRating)}</div>
                <div class="person-details">
                  ${age} yrs | ${bezirk} | Prefers: ${prefMin}-${prefMax}
                  ${isAgeMismatch ? ' | ⚠️ Age mismatch' : ''}
                </div>
                <div class="person-meta">
                  <div class="meta-item"><span class="meta-label">Sexuality:</span> ${sexuality}</div>
                  <div class="meta-item"><span class="meta-label">Language:</span> ${language}</div>
                  <div class="meta-item"><span class="meta-label">Intention:</span> ${mainIntention}</div>
                  <div class="meta-item"><span class="meta-label">Rel. Style:</span> ${relationshipStyle}</div>
                </div>
                <div class="person-controls">
                  <div class="control-group">
                    <span class="control-label">Payment</span>
                    <div class="payment-group">
                      <div class="payment-check">
                        <input type="checkbox" id="paid-${email}" onchange="updatePersonData('${email.replace(/'/g, "\\'")}', 'paid', this.checked)">
                        <label for="paid-${email}">Paid</label>
                      </div>
                      <input type="number" class="payment-amount" id="amount-${email}" placeholder="Amount" min="0" step="0.01" onchange="updatePersonData('${email.replace(/'/g, "\\'")}', 'amount', this.value)" />
                    </div>
                  </div>
                  <div class="control-group">
                    <span class="control-label">Availability</span>
                    <select class="availability-select" id="availability-${email}" onchange="updatePersonData('${email.replace(/'/g, "\\'")}', 'availability', this.value); this.classList.toggle('not-attending', this.value === 'D')">
                      <option value="">Select...</option>
                      <option value="A">A</option>
                      <option value="B">B</option>
                      <option value="C">C</option>
                      <option value="D">D - Not Attending</option>
                    </select>
                  </div>
                </div>
              </div>
              <div class="person-card-footer">
                <button class="btn-assign" onclick="assignToPrimary('${dateName}', '${gender}', '${email.replace(/'/g, "\\'")}')">Assign</button>
              </div>
            </div>
          `;
        }
      });

      html += '</div></div>';
      return html;
    }

    function checkAgeMismatch(person) {
      const age = parseInt(person['Age'] || 0);
      const prefMin = parseInt(person['Preferred Age Min'] || person['Age Preference Min'] || 0);
      const prefMax = parseInt(person['Preferred Age Max'] || person['Age Preference Max'] || 0);

      if (prefMin === 0 || prefMax === 0) return false;
      return age < prefMin || age > prefMax;
    }

    function checkAgeCompatibilityInSlots(dateName, gender, person) {
      const personAge = parseInt(person['Age'] || 0);
      const personPrefMin = parseInt(person['Preferred Age Min'] || person['Age Preference Min'] || 0);
      const personPrefMax = parseInt(person['Preferred Age Max'] || person['Age Preference Max'] || 0);

      const issues = [];

      // Check compatibility with other people in Primary slots
      for (let i = 0; i < 4; i++) {
        const slotKey = `${dateName}:${gender}:${i}`;
        const otherPerson = selections[slotKey];

        if (otherPerson && (otherPerson['Email'] || '') !== (person['Email'] || '')) {
          const otherAge = parseInt(otherPerson['Age'] || 0);
          const otherPrefMin = parseInt(otherPerson['Preferred Age Min'] || otherPerson['Age Preference Min'] || 0);
          const otherPrefMax = parseInt(otherPerson['Preferred Age Max'] || otherPerson['Age Preference Max'] || 0);

          // Check if person's age fits in other person's preference
          if (otherPrefMin > 0 && otherPrefMax > 0) {
            if (personAge < otherPrefMin || personAge > otherPrefMax) {
              issues.push(`${otherPerson.Name || otherPerson['Email']}: wants ${otherPrefMin}-${otherPrefMax}`);
            }
          }

          // Check if other person's age fits in person's preference
          if (personPrefMin > 0 && personPrefMax > 0) {
            if (otherAge < personPrefMin || otherAge > personPrefMax) {
              issues.push(`${otherPerson.Name || otherPerson['Email']}: ${otherAge} yrs`);
            }
          }
        }
      }

      return issues;
    }

    function updatePersonData(email, field, value) {
      if (!personData[email]) {
        personData[email] = { paid: false, amount: 0, availability: '' };
      }
      personData[email][field] = value;
    }

    function assignToPrimary(dateName, gender, email) {
      const allPeople = dates[dateName];
      const person = allPeople.find(p => (p['Email'] || '') === email);

      if (!person) return;

      // Find first available slot
      for (let i = 0; i < 4; i++) {
        const slotKey = `${dateName}:${gender}:${i}`;
        if (!selections[slotKey]) {
          selections[slotKey] = person;
          displayDates();
          return;
        }
      }

      alert('All primary slots for this gender are full!');
    }

    function toggleEventGroup(eventGroupElement) {
      const content = eventGroupElement.querySelector('.event-group-content');
      const toggle = eventGroupElement.querySelector('.event-group-toggle');

      content.classList.toggle('collapsed');
      toggle.classList.toggle('collapsed');
    }

    function removeFromSlot(slotKey) {
      delete selections[slotKey];
      displayDates();
    }

    function copyEmails(dateName) {
      const emails = Object.values(selections)
        .filter(p => {
          // Check if this person belongs to this date
          const personKey = Object.keys(selections).find(k => selections[k] === p);
          return personKey && personKey.startsWith(dateName + ':');
        })
        .map(p => p['Email'] || '')
        .filter(e => e);

      if (emails.length === 0) {
        alert('No primary choices selected yet.');
        return;
      }

      const emailList = emails.join(', ');
      navigator.clipboard.writeText(emailList).then(() => {
        alert(`✅ Copied ${emails.length} email(s) to clipboard!`);
      });
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      try {
        const response = await fetch('/logout', { method: 'POST' });
        const data = await response.json();
        if (data.success) {
          window.location.href = '/';
        }
      } catch (err) {
        console.error('Logout failed:', err);
      }
    });

    function openPersonProfile(email) {
      const person = allData.find(p => (p['Email'] || p['email']) === email);
      if (!person) return;

      const modal = document.getElementById('personProfileModal');
      const profileName = document.getElementById('profileName');
      const profileContent = document.getElementById('profileContent');

      profileName.textContent = person.Name || email;

      let html = `
        <div class="profile-section">
          <div class="profile-section-title">Contact Information</div>
          <div class="profile-field">
            <span class="profile-field-label">Email</span>
            <span class="profile-field-value">${person['Email'] || '-'}</span>
          </div>
          <div class="profile-field">
            <span class="profile-field-label">Phone</span>
            <span class="profile-field-value">${person['Phone'] || person['phone'] || '-'}</span>
          </div>
        </div>

        <div class="profile-section">
          <div class="profile-section-title">Personal Information</div>
          <div class="profile-field">
            <span class="profile-field-label">Gender</span>
            <span class="profile-field-value">${person['Gender'] || person['gender'] || '-'}</span>
          </div>
          <div class="profile-field">
            <span class="profile-field-label">Age</span>
            <span class="profile-field-value">${person['Age'] || person['age'] || '-'}</span>
          </div>
          <div class="profile-field">
            <span class="profile-field-label">Bezirk</span>
            <span class="profile-field-value">${person['Bezirk'] || person['bezirk'] || '-'}</span>
          </div>
          <div class="profile-field">
            <span class="profile-field-label">Responsiveness</span>
            <span class="profile-field-value">${renderStars(calculateResponsivenessStar(email))}</span>
          </div>
        </div>

        <div class="profile-section">
          <div class="profile-section-title">Preferences & Interests</div>
          <div class="profile-field">
            <span class="profile-field-label">Sexuality</span>
            <span class="profile-field-value">${person['Sexuality'] || person['sexuality'] || '-'}</span>
          </div>
          <div class="profile-field">
            <span class="profile-field-label">Attracted To</span>
            <span class="profile-field-value">${person['Attracted To'] || person['attracted to'] || '-'}</span>
          </div>
          <div class="profile-field">
            <span class="profile-field-label">Language</span>
            <span class="profile-field-value">${person['Language'] || person['Languages'] || person['language'] || person['languages'] || '-'}</span>
          </div>
          <div class="profile-field">
            <span class="profile-field-label">Relationship Style</span>
            <span class="profile-field-value">${person['Relationship Style'] || person['relationship style'] || '-'}</span>
          </div>
          <div class="profile-field">
            <span class="profile-field-label">Main Intention</span>
            <span class="profile-field-value">${person['Main Intention'] || person['main intention'] || person['Intention'] || person['intention'] || '-'}</span>
          </div>
        </div>

        <div class="profile-section">
          <div class="profile-section-title">Age Preferences</div>
          <div class="profile-field">
            <span class="profile-field-label">Preferred Age Range</span>
            <span class="profile-field-value">
              ${(person['Preferred Age Min'] || person['Age Preference Min'] || '?')} -
              ${(person['Preferred Age Max'] || person['Age Preference Max'] || '?')} years
            </span>
          </div>
        </div>
      `;

      if (person['Bio'] || person['bio']) {
        html += `
          <div class="profile-section">
            <div class="profile-section-title">Bio</div>
            <div class="profile-bio">${person['Bio'] || person['bio']}</div>
          </div>
        `;
      }

      if (person['Venue Preferences'] || person['venue preferences']) {
        html += `
          <div class="profile-section">
            <div class="profile-section-title">Venue Preferences</div>
            <div class="profile-field">
              <span class="profile-field-value">${person['Venue Preferences'] || person['venue preferences']}</span>
            </div>
          </div>
        `;
      }

      profileContent.innerHTML = html;
      modal.classList.add('active');
    }

    function closePersonProfile() {
      document.getElementById('personProfileModal').classList.remove('active');
    }

    window.addEventListener('click', (event) => {
      const modal = document.getElementById('personProfileModal');
      if (event.target === modal) {
        closePersonProfile();
      }
    });

    loadDates();

    function calculateResponsivenessStar(email) {
      // Calculate star rating based on attendance and responsiveness
      // 5 stars: 90%+ attendance, responds <24h
      // 4 stars: 70-90% attendance, responds <48h
      // 3 stars: 50-70% attendance
      // 2 stars: 30-50% attendance
      // 1 star: <30% attendance
      
      // For now, use a default of 3 stars per person
      // In a real implementation, this would be calculated from event participation history
      return 3;
    }

    function renderStars(rating) {
      let html = '<div class="responsiveness-stars">';
      for (let i = 1; i <= 5; i++) {
        html += `<span class="star ${i > rating ? 'empty' : ''}">★</span>`;
      }
      html += '</div>';
      return html;
    }
  </script>
</body>
</html>
