<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Duck Playspace</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-bg grid-bg"></div>


  <div class="login-container">
    <div style="text-align: center; margin-bottom: 2rem;">
      <img src="images/DDA-logo.png" alt="DDA Logo" style="height: 100px; width: auto;">
    </div>

    <h1>Duck Playspace</h1>
    <div class="subtitle">Join the Flock</div>

    <form id="loginForm">
      <div class="form-group">
        <label for="password">Enter Password:</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="What's the magic word?"
          required
          autofocus
        >
      </div>
      <button type="submit" class="btn">Hop In</button>
      <p id="error" class="error-message"></p>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error');

      try {
        const response = await fetch('/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ password })
        });

        const data = await response.json();

        if (data.success) {
          window.location.href = '/home';
        } else {
          errorEl.textContent = 'Wrong password. Please try again.';
          document.getElementById('password').value = '';
        }
      } catch (err) {
        errorEl.textContent = 'An error occurred. Please try again.';
      }
    });
  </script>
</body>
</html>
