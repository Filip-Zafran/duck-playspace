<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poll Results</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    .container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      max-width: 700px;
      width: 100%;
      padding: 40px;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
    }

    .description {
      color: #666;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .duration {
      color: #999;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .timer {
      background: #fff3cd;
      border: 1px solid #ffc107;
      padding: 12px;
      border-radius: 5px;
      margin-bottom: 30px;
      text-align: center;
      font-weight: 600;
      color: #856404;
    }

    .timer.expired {
      background: #f8d7da;
      border-color: #f5c6cb;
      color: #721c24;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }

    .error {
      background: #f8d7da;
      color: #721c24;
      padding: 15px;
      border-radius: 5px;
    }

    .results-section {
      margin-bottom: 30px;
    }

    .result-item {
      margin-bottom: 20px;
    }

    .result-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
    }

    .result-bar {
      height: 30px;
      background: #f0f0f0;
      border-radius: 5px;
      overflow: hidden;
      position: relative;
    }

    .result-fill {
      height: 100%;
      display: flex;
      align-items: center;
      padding: 0 10px;
      color: white;
      font-weight: 600;
      font-size: 14px;
      transition: width 0.3s;
    }

    .result-fill.date1 { background: #3498db; }
    .result-fill.date2 { background: #2ecc71; }
    .result-fill.date3 { background: #e74c3c; }
    .result-fill.none { background: #95a5a6; }

    .vote-preview {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
    }

    .vote-preview h3 {
      color: #333;
      margin-bottom: 15px;
      font-size: 16px;
    }

    .voter-item {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      padding: 10px;
      background: white;
      border-radius: 5px;
      border-left: 4px solid;
    }

    .voter-item.date1 { border-left-color: #3498db; }
    .voter-item.date2 { border-left-color: #2ecc71; }
    .voter-item.date3 { border-left-color: #e74c3c; }
    .voter-item.none { border-left-color: #95a5a6; }

    .voter-initials {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 12px;
      color: white;
      margin-right: 10px;
      flex-shrink: 0;
    }

    .voter-initials.date1 { background: #3498db; }
    .voter-initials.date2 { background: #2ecc71; }
    .voter-initials.date3 { background: #e74c3c; }
    .voter-initials.none { background: #95a5a6; }

    .voter-name {
      color: #333;
      font-weight: 500;
    }

    .voter-choice {
      font-size: 12px;
      color: #999;
      margin-left: auto;
    }

    button {
      padding: 10px 20px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.3s;
      margin-top: 20px;
    }

    button:hover {
      background: #764ba2;
    }

    .summary {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
      text-align: center;
    }

    .summary-stat {
      display: inline-block;
      margin: 0 15px;
    }

    .summary-stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #667eea;
    }

    .summary-stat-label {
      font-size: 12px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .updating {
      font-size: 12px;
      color: #999;
      text-align: center;
      margin-top: 10px;
    }

    @media (max-width: 600px) {
      .container {
        padding: 25px;
      }

      .summary {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .summary-stat {
        margin: 0;
      }
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="loading">Loading results...</div>
  </div>

  <script>
    const API_BASE = '/api';
    let pollId = null;
    let timerInterval = null;

    async function loadResults() {
      const params = new URLSearchParams(window.location.search);
      pollId = params.get('token');

      if (!pollId) {
        document.getElementById('app').innerHTML = '<div class="error">Poll ID not provided</div>';
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/vote/${pollId}`);
        if (!response.ok) {
          throw new Error('Poll not found');
        }

        const poll = await response.json();
        renderResults(poll);
        startTimer(poll.timer_end);

        // Auto-refresh results every 3 seconds
        setInterval(async () => {
          const updated = await fetch(`${API_BASE}/vote/${pollId}`).then(r => r.json());
          updateResults(updated);
        }, 3000);
      } catch (error) {
        document.getElementById('app').innerHTML = `<div class="error">${error.message}</div>`;
      }
    }

    function renderResults(poll) {
      const totalVotes = (poll.counts.date1 || 0) + (poll.counts.date2 || 0) + (poll.counts.date3 || 0) + (poll.counts.none || 0);

      const timerHtml = poll.timer_end ? `
        <div class="timer" id="timerDisplay">
          Calculating time...
        </div>
      ` : '';

      const votersHtml = poll.previews && poll.previews.length > 0 ? `
        <div class="vote-preview">
          <h3>Recent Votes</h3>
          <div id="votersList">
            ${poll.previews.map((v, idx) => getVoterHtml(v, idx)).join('')}
          </div>
        </div>
      ` : '';

      const html = `
        <h1>${poll.title}</h1>
        <p class="description">${poll.description}</p>
        <p class="duration">Duration: ${poll.duration}</p>
        <p class="duration">Expected Attendees: ${poll.expected}</p>
        ${timerHtml}

        <div class="summary">
          <div class="summary-stat">
            <div class="summary-stat-value">${totalVotes}</div>
            <div class="summary-stat-label">Total Votes</div>
          </div>
          <div class="summary-stat">
            <div class="summary-stat-value">${poll.expected}</div>
            <div class="summary-stat-label">Expected</div>
          </div>
        </div>

        <div class="results-section" id="resultsContainer">
          ${renderResultsHtml(poll.counts, totalVotes, poll)}
        </div>

        ${votersHtml}

        <button onclick="window.location.href='/poll-vote?token=${pollId}'">Vote Now</button>
        <p class="updating">Results update automatically every 3 seconds</p>
      `;

      document.getElementById('app').innerHTML = html;
    }

    function renderResultsHtml(counts, total, poll) {
      const options = [
        { key: 'date1', label: formatDate(poll.date1) + (poll.time1 ? ` @ ${poll.time1}` : '') },
        { key: 'date2', label: formatDate(poll.date2) + (poll.time2 ? ` @ ${poll.time2}` : '') },
        { key: 'date3', label: formatDate(poll.date3) + (poll.time3 ? ` @ ${poll.time3}` : '') },
        { key: 'none', label: "Can't make it" }
      ];

      return options.map(opt => {
        const count = counts[opt.key] || 0;
        const percent = total > 0 ? Math.round((count / total) * 100) : 0;
        const width = total > 0 ? (count / total) * 100 : 0;

        return `
          <div class="result-item">
            <div class="result-label">
              <span>${opt.label}</span>
              <span>${count} (${percent}%)</span>
            </div>
            <div class="result-bar">
              <div class="result-fill ${opt.key}" style="width: ${width}%">
                ${width > 20 ? `${percent}%` : ''}
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function updateResults(poll) {
      const resultsContainer = document.getElementById('resultsContainer');
      if (resultsContainer) {
        const totalVotes = (poll.counts.date1 || 0) + (poll.counts.date2 || 0) + (poll.counts.date3 || 0) + (poll.counts.none || 0);
        resultsContainer.innerHTML = renderResultsHtml(poll.counts, totalVotes, poll);
      }

      const votersList = document.getElementById('votersList');
      if (votersList && poll.previews) {
        votersList.innerHTML = poll.previews.map((v, idx) => getVoterHtml(v, idx)).join('');
      }
    }

    function getVoterHtml(voter, idx) {
      const choiceLabel = {
        'date1': 'Option 1',
        'date2': 'Option 2',
        'date3': 'Option 3',
        'none': "Can't make it"
      };

      return `
        <div class="voter-item ${voter.choice}">
          <div class="voter-initials ${voter.choice}">${voter.initials}</div>
          <div class="voter-name">Voter ${idx + 1}</div>
          <div class="voter-choice">${choiceLabel[voter.choice]}</div>
        </div>
      `;
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    }

    function startTimer(timerEnd) {
      if (!timerEnd) return;

      function updateTimer() {
        const now = new Date();
        const end = new Date(timerEnd);
        const diff = end - now;

        if (diff <= 0) {
          document.getElementById('timerDisplay').textContent = 'Voting has ended';
          document.getElementById('timerDisplay').classList.add('expired');
          clearInterval(timerInterval);
          return;
        }

        const hours = Math.floor(diff / 3600000);
        const minutes = Math.floor((diff % 3600000) / 60000);
        const seconds = Math.floor((diff % 60000) / 1000);

        const timerDisplay = document.getElementById('timerDisplay');
        timerDisplay.textContent = `Voting ends in ${hours}h ${minutes}m ${seconds}s`;

        if (hours < 1) {
          timerDisplay.style.background = '#f8d7da';
          timerDisplay.style.borderColor = '#f5c6cb';
          timerDisplay.style.color = '#721c24';
        }
      }

      updateTimer();
      timerInterval = setInterval(updateTimer, 1000);
    }

    loadResults();
  </script>
</body>
</html>
