<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code of Conduct Quiz - Duck Playspace</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .dashboard-wrapper {
      width: 100vw;
      margin-left: calc(-50vw + 50%);
      padding: 20px;
      box-sizing: border-box;
    }

    main.content {
      width: 100%;
      max-width: 1200px;
    }

    .quiz-container {
      max-width: 800px;
      margin: 0 auto;
    }

    .quiz-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      border-radius: 10px;
      margin-bottom: 30px;
      text-align: center;
    }

    .quiz-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .quiz-description {
      font-size: 14px;
      opacity: 0.9;
      line-height: 1.6;
    }

    .progress-bar-container {
      background: rgba(255, 255, 255, 0.3);
      border-radius: 20px;
      height: 10px;
      margin-top: 20px;
      overflow: hidden;
    }

    .progress-bar {
      background: white;
      height: 100%;
      transition: width 0.3s ease;
    }

    .progress-text {
      font-size: 12px;
      margin-top: 10px;
      opacity: 0.9;
    }

    .question-card {
      background: white;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      padding: 30px;
      margin-bottom: 30px;
      transition: border-color 0.3s;
    }

    .question-card.answered {
      border-color: #667eea;
      background: #f0f3ff;
    }

    .question-number {
      display: inline-block;
      background: #667eea;
      color: white;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      text-align: center;
      line-height: 30px;
      font-weight: 700;
      margin-right: 10px;
      margin-bottom: 15px;
    }

    .question-text {
      font-size: 18px;
      font-weight: 600;
      color: #333;
      margin-bottom: 20px;
      display: inline-block;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      background: white;
    }

    .option:hover {
      border-color: #667eea;
      background: #f9f9f9;
    }

    .option input[type="radio"] {
      width: 20px;
      height: 20px;
      margin-top: 2px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .option-text {
      flex: 1;
      font-size: 14px;
      color: #333;
      line-height: 1.5;
    }

    .option.selected {
      border-color: #667eea;
      background: #f0f3ff;
    }

    .option.correct {
      border-color: #10b981;
      background: #ecfdf5;
    }

    .option.incorrect {
      border-color: #ef4444;
      background: #fef2f2;
    }

    .feedback {
      margin-top: 15px;
      padding: 15px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.6;
    }

    .feedback.correct {
      background: #ecfdf5;
      border-left: 4px solid #10b981;
      color: #047857;
    }

    .feedback.incorrect {
      background: #fef2f2;
      border-left: 4px solid #ef4444;
      color: #991b1b;
    }

    .feedback-label {
      font-weight: 700;
      margin-bottom: 8px;
    }

    .completion-card {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      padding: 40px;
      border-radius: 10px;
      text-align: center;
      margin-bottom: 30px;
    }

    .completion-icon {
      font-size: 60px;
      margin-bottom: 20px;
    }

    .completion-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 15px;
    }

    .completion-message {
      font-size: 14px;
      line-height: 1.6;
      opacity: 0.95;
      margin-bottom: 25px;
    }

    .reward-box {
      background: rgba(255, 255, 255, 0.15);
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 8px;
      padding: 20px;
      margin: 20px 0;
      text-align: left;
    }

    .reward-label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      opacity: 0.8;
      margin-bottom: 8px;
    }

    .reward-value {
      font-size: 16px;
      font-weight: 600;
    }

    .no-reward {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      color: white;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      margin-bottom: 30px;
    }

    .retry-message {
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .btn-container {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-submit {
      padding: 12px 28px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: background 0.3s;
    }

    .btn-submit:hover {
      background: #764ba2;
    }

    .btn-submit:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .btn-retry {
      padding: 12px 28px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: background 0.3s;
    }

    .btn-retry:hover {
      background: #764ba2;
    }

    .loading {
      text-align: center;
      padding: 40px 20px;
      color: #666;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .quiz-header {
        padding: 20px;
      }

      .quiz-title {
        font-size: 22px;
      }

      .question-card {
        padding: 20px;
      }

      .question-text {
        font-size: 16px;
      }

      .completion-card {
        padding: 25px;
      }

      .completion-title {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="page-container">
    <div class="page-bg grid-bg"></div>

    <div class="container">
      <header class="header">
        <div>
          <div style="display: flex; align-items: center; gap: 1rem;">
            <img src="images/DDA-logo.png" alt="DDA Logo" style="height: 50px; width: auto;">
            <h1>Duck Playspace</h1>
          </div>
          <div class="header-subtitle">Code of Conduct Quiz</div>
        </div>
        <div style="display: flex; gap: 1rem; align-items: center;">
          <a href="/communication" class="btn btn-primary" style="padding: 8px 16px; text-decoration: none; font-weight: 600; border-radius: 5px;">Communication</a>
          <button id="logoutBtn" class="btn btn-logout">Logout</button>
        </div>
      </header>

      <nav class="navbar">
        <a href="/home" class="nav-link">Home</a>
        <a href="/upload-data" class="nav-link">Upload Data</a>
        <a href="/data-filters" class="nav-link">Data</a>
        <a href="/groups" class="nav-link">Groups</a>
        <a href="/events" class="nav-link">Events</a>
        <a href="/poll" class="nav-link">Polls</a>
        <a href="/communication" class="nav-link">Communication</a>
        <a href="/quiz" class="nav-link active">Quiz</a>
      </nav>

      <main class="content dashboard-wrapper">
        <div class="quiz-container" id="quizContainer">
          <div class="loading">
            <div class="spinner"></div>
            <p>Loading quiz...</p>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
    const QUIZ_ID = 'coc-2026';
    let voterToken = '';
    let quizData = null;
    let userAnswers = {};

    // Generate or retrieve voter token
    function getVoterToken() {
      let token = localStorage.getItem('quiz_voter_token');
      if (!token) {
        token = 'device_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
        localStorage.setItem('quiz_voter_token', token);
      }
      return token;
    }

    async function loadQuiz() {
      try {
        voterToken = getVoterToken();

        // Fetch quiz data
        const response = await fetch(`/api/quizzes/${QUIZ_ID}`);
        if (!response.ok) {
          throw new Error('Quiz not found');
        }

        quizData = await response.json();

        // Fetch user progress
        const progressResponse = await fetch(`/api/quiz-progress/${QUIZ_ID}?voter_token=${voterToken}`);
        const progress = await progressResponse.json();

        renderQuiz(progress);
      } catch (error) {
        console.error('Error loading quiz:', error);
        document.getElementById('quizContainer').innerHTML = `
          <div class="no-reward">
            <h2>Quiz Not Available</h2>
            <p>The Code of Conduct Quiz is not yet available. Please check back soon.</p>
            <p style="margin-top: 20px; font-size: 12px;">If you're an admin, make sure to initialize the quiz first.</p>
          </div>
        `;
      }
    }

    function renderQuiz(progress) {
      const container = document.getElementById('quizContainer');
      container.innerHTML = '';

      const percent = progress.percent_correct;
      const completed = progress.completed;

      if (completed) {
        renderCompletionCard(container);
      } else {
        renderQuestionsCard(container, progress);
      }
    }

    function renderCompletionCard(container) {
      const completionData = quizData.reward_address ? {
        location: quizData.reward_location,
        address: quizData.reward_address,
        time: quizData.meeting_time
      } : null;

      let html = `
        <div class="completion-card">
          <div class="completion-icon">🎉</div>
          <div class="completion-title">Quiz Complete!</div>
          <div class="completion-message">
            You've successfully completed the Code of Conduct quiz and demonstrated your understanding of our values.
          </div>
      `;

      if (completionData) {
        html += `
          <div class="reward-box">
            <div class="reward-label">📍 Event Location</div>
            <div class="reward-value">${escapeHtml(completionData.location)}</div>
          </div>
          <div class="reward-box">
            <div class="reward-label">📬 Address</div>
            <div class="reward-value">${escapeHtml(completionData.address)}</div>
          </div>
          <div class="reward-box">
            <div class="reward-label">🕐 Meeting Time</div>
            <div class="reward-value">${escapeHtml(completionData.time)}</div>
          </div>
        `;
      }

      html += `
          <div style="margin-top: 25px;">
            <button class="btn-retry" onclick="retakeQuiz()">Retake Quiz</button>
          </div>
        </div>
      `;

      container.innerHTML = html;
    }

    function renderQuestionsCard(container, progress) {
      let html = `
        <div class="quiz-header">
          <div class="quiz-title">${escapeHtml(quizData.title)}</div>
          <div class="quiz-description">${escapeHtml(quizData.description || 'Test your knowledge of our Code of Conduct')}</div>
          <div class="progress-bar-container">
            <div class="progress-bar" style="width: ${progress.percent_correct}%"></div>
          </div>
          <div class="progress-text">
            ${progress.correct_answers} of ${progress.total_questions} questions answered correctly
          </div>
        </div>
      `;

      quizData.questions.forEach((question, index) => {
        const qIndex = index + 1;
        const answered = userAnswers[question.id];

        html += `
          <div class="question-card ${answered ? 'answered' : ''}">
            <div>
              <span class="question-number">${qIndex}</span>
              <span class="question-text">${escapeHtml(question.question_text)}</span>
            </div>
            <div class="options">
        `;

        const letters = ['A', 'B', 'C'];
        letters.forEach(letter => {
          const isCorrect = letter === question.correct_answer;
          const isSelected = answered === letter;
          let optionClass = 'option';

          if (answered) {
            if (isSelected && isCorrect) {
              optionClass += ' selected correct';
            } else if (isSelected && !isCorrect) {
              optionClass += ' selected incorrect';
            } else if (isCorrect) {
              optionClass += ' correct';
            }
          } else if (isSelected) {
            optionClass += ' selected';
          }

          html += `
            <label class="${optionClass}" onclick="selectAnswer(${question.id}, '${letter}')">
              <input type="radio" name="q${question.id}" value="${letter}" ${isSelected ? 'checked' : ''}>
              <div class="option-text">
                <strong>${letter}.</strong> ${escapeHtml(question.options[letter])}
              </div>
            </label>
          `;
        });

        if (answered) {
          const isCorrect = answered === question.correct_answer;
          html += `
            <div class="feedback ${isCorrect ? 'correct' : 'incorrect'}">
              <div class="feedback-label">${isCorrect ? '✓ Correct!' : '✗ Incorrect'}</div>
              <div>${escapeHtml(question.explanation || (isCorrect ? 'Great job!' : 'Try reading the Code of Conduct again.'))}</div>
            </div>
          `;
        }

        html += `
            </div>
          </div>
        `;
      });

      html += `
        <div class="btn-container">
          <button class="btn-submit" onclick="submitQuiz()" ${progress.submitted_answers < progress.total_questions ? '' : 'style="display:none;"'}>
            ${progress.submitted_answers > 0 ? 'Submit Remaining Answers' : 'Start Quiz'}
          </button>
        </div>
      `;

      container.innerHTML = html;

      // Load previous answers
      quizData.questions.forEach(q => {
        const radio = document.querySelector(`input[name="q${q.id}"]:checked`);
        if (radio) {
          userAnswers[q.id] = radio.value;
        }
      });
    }

    async function selectAnswer(questionId, letter) {
      userAnswers[questionId] = letter;

      try {
        const response = await fetch(`/api/quiz-answer/${QUIZ_ID}`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            voter_token: voterToken,
            question_id: questionId,
            selected_answer: letter
          })
        });

        const result = await response.json();

        // Refresh progress
        const progressResponse = await fetch(`/api/quiz-progress/${QUIZ_ID}?voter_token=${voterToken}`);
        const progress = await progressResponse.json();

        renderQuiz(progress);
      } catch (error) {
        console.error('Error submitting answer:', error);
        alert('Error recording your answer. Please try again.');
      }
    }

    async function submitQuiz() {
      // All answers are submitted individually, so just refresh the view
      const progressResponse = await fetch(`/api/quiz-progress/${QUIZ_ID}?voter_token=${voterToken}`);
      const progress = await progressResponse.json();

      if (progress.completed) {
        renderQuiz(progress);
      } else {
        alert('Please answer all questions before submitting.');
      }
    }

    function retakeQuiz() {
      userAnswers = {};
      localStorage.removeItem('quiz_voter_token');
      loadQuiz();
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      try {
        const response = await fetch('/logout', {
          method: 'POST'
        });

        const data = await response.json();

        if (data.success) {
          window.location.href = '/';
        }
      } catch (err) {
        console.error('Logout failed:', err);
      }
    });

    // Keep-alive ping
    function startKeepAlive() {
      setInterval(() => {
        const randomDelay = Math.random() * 60000 + 60000;
        setTimeout(() => {
          fetch('/ping').catch(err => console.log('Ping failed (expected if offline):', err));
        }, randomDelay);
      }, 120000);

      fetch('/ping').catch(err => console.log('Initial ping failed (expected if offline):', err));
    }

    startKeepAlive();

    // Load quiz when page loads
    loadQuiz();
  </script>
</body>
</html>
