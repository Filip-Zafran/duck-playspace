<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poll Admin Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      max-width: 1000px;
      width: 100%;
      padding: 40px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 15px;
    }

    h1 {
      margin: 0;
      color: #333;
    }

    .button-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button, input[type="submit"] {
      background: #667eea;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.3s;
    }

    button:hover, input[type="submit"]:hover {
      background: #764ba2;
    }

    button.danger {
      background: #e74c3c;
    }

    button.danger:hover {
      background: #c0392b;
    }

    button.secondary {
      background: #95a5a6;
    }

    button.secondary:hover {
      background: #7f8c8d;
    }

    .form-section {
      background: #f8f9fa;
      padding: 30px;
      border-radius: 8px;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
    }

    input[type="text"],
    input[type="number"],
    input[type="date"],
    input[type="time"],
    textarea,
    select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      box-sizing: border-box;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .form-row.three-col {
      grid-template-columns: 1fr 1fr 1fr;
    }

    @media (max-width: 768px) {
      .form-row,
      .form-row.three-col {
        grid-template-columns: 1fr;
      }
    }

    .polls-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    .polls-table th,
    .polls-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }

    .polls-table th {
      background: #f8f9fa;
      font-weight: 600;
      color: #333;
    }

    .polls-table tr:hover {
      background: #f8f9fa;
    }

    .poll-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .poll-actions button {
      padding: 6px 12px;
      font-size: 12px;
    }

    .token-display {
      background: #f0f0f0;
      padding: 8px 12px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      word-break: break-all;
      position: relative;
    }

    .copy-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 4px 8px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
      margin-left: 8px;
    }

    .copy-btn:hover {
      background: #764ba2;
    }

    .success-message {
      background: #d4edda;
      color: #155724;
      padding: 12px;
      border-radius: 5px;
      margin-bottom: 20px;
      display: none;
    }

    .error-message {
      background: #f8d7da;
      color: #721c24;
      padding: 12px;
      border-radius: 5px;
      margin-bottom: 20px;
      display: none;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #666;
    }

    .no-polls {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .vote-counts {
      font-size: 12px;
      color: #666;
    }

    .date-group {
      border: 1px solid #ddd;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 15px;
    }

    .date-group label {
      font-weight: 600;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 2px solid #ddd;
    }

    .tab {
      padding: 10px 20px;
      background: none;
      border: none;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      color: #666;
      font-weight: 500;
    }

    .tab.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    body {
      display: flex;
      flex-direction: column;
      background: white;
      min-height: 100vh;
    }

    .page-wrapper {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .navbar-wrapper {
      background: white;
      border-bottom: 2px solid #000;
      padding: 0 2rem;
      display: flex;
      gap: 2rem;
      position: relative;
      z-index: 10;
    }

    .navbar-wrapper .nav-link {
      padding: 1rem 0;
      color: #000;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
      display: inline-block;
    }

    .navbar-wrapper .nav-link:hover {
      color: #ff5b92;
    }

    .navbar-wrapper .nav-link.active {
      color: #ff5b92;
      border-bottom-color: #ff5b92;
    }

    .content-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      flex: 1;
    }

    .container {
      align-self: center;
    }
  </style>
</head>
<body>
  <div class="navbar-wrapper">
    <a href="/home" class="nav-link">Home</a>
    <a href="/poll" class="nav-link active">Polls</a>
  </div>

  <div class="content-wrapper">
    <div class="container">
    <div class="header">
      <h1>Poll Admin Dashboard</h1>
      <div class="button-group">
        <button class="secondary" onclick="location.href='/home'">Back</button>
      </div>
    </div>

    <div class="success-message" id="successMsg"></div>
    <div class="error-message" id="errorMsg"></div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('create')">Create Poll</button>
      <button class="tab" onclick="switchTab('manage')">Manage Polls</button>
    </div>

    <!-- Create Poll Tab -->
    <div id="create" class="tab-content active">
      <div class="form-section">
        <h2>Create New Poll</h2>
        <form id="pollForm">
          <div class="form-group">
            <label for="title">Poll Title *</label>
            <input type="text" id="title" name="title" required>
          </div>

          <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" placeholder="Join us for an exciting event..."></textarea>
          </div>

          <div class="form-group">
            <label for="duration">Event Duration *</label>
            <input type="text" id="duration" name="duration" placeholder="e.g., 2 hours, Half day" required>
          </div>

          <div class="form-group">
            <label for="expected">Expected Attendees</label>
            <input type="number" id="expected" name="expected" value="8" min="0">
          </div>

          <h3>Date Options</h3>

          <div class="date-group">
            <label>Option 1 *</label>
            <div class="form-row">
              <div>
                <label for="date1" style="font-weight: normal; margin-bottom: 5px;">Date (YYYY-MM-DD)</label>
                <input type="date" id="date1" name="date1" required>
              </div>
              <div>
                <label for="time1" style="font-weight: normal; margin-bottom: 5px;">Time (HH:mm)</label>
                <input type="time" id="time1" name="time1">
              </div>
            </div>
          </div>

          <div class="date-group">
            <label>Option 2 *</label>
            <div class="form-row">
              <div>
                <label for="date2" style="font-weight: normal; margin-bottom: 5px;">Date (YYYY-MM-DD)</label>
                <input type="date" id="date2" name="date2" required>
              </div>
              <div>
                <label for="time2" style="font-weight: normal; margin-bottom: 5px;">Time (HH:mm)</label>
                <input type="time" id="time2" name="time2">
              </div>
            </div>
          </div>

          <div class="date-group">
            <label>Option 3 *</label>
            <div class="form-row">
              <div>
                <label for="date3" style="font-weight: normal; margin-bottom: 5px;">Date (YYYY-MM-DD)</label>
                <input type="date" id="date3" name="date3" required>
              </div>
              <div>
                <label for="time3" style="font-weight: normal; margin-bottom: 5px;">Time (HH:mm)</label>
                <input type="time" id="time3" name="time3">
              </div>
            </div>
          </div>

          <div class="form-group">
            <label for="timer_minutes">Timer Duration (minutes) - 0 for no timer</label>
            <input type="number" id="timer_minutes" name="timer_minutes" value="1440" min="0">
            <small style="color: #666;">Default: 1440 (24 hours)</small>
          </div>

          <button type="submit" style="margin-top: 20px;">Create Poll</button>
        </form>
      </div>
    </div>

    <!-- Manage Polls Tab -->
    <div id="manage" class="tab-content">
      <h2>Your Polls</h2>
      <div id="pollsList"></div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';

    function switchTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      event.target.classList.add('active');

      if (tabName === 'manage') {
        loadPolls();
      }
    }

    document.getElementById('pollForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const formData = {
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
        duration: document.getElementById('duration').value,
        expected: parseInt(document.getElementById('expected').value) || 8,
        date1: document.getElementById('date1').value,
        time1: document.getElementById('time1').value || null,
        date2: document.getElementById('date2').value,
        time2: document.getElementById('time2').value || null,
        date3: document.getElementById('date3').value,
        time3: document.getElementById('time3').value || null,
        timer_minutes: parseInt(document.getElementById('timer_minutes').value) || 0
      };

      try {
        const response = await fetch(`${API_BASE}/polls`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });

        const data = await response.json();

        if (response.ok) {
          showMessage(`Poll created! Vote URL: ${data.vote_url}`, 'success');
          document.getElementById('pollForm').reset();
          loadPolls();
          setTimeout(() => switchTab('manage'), 1000);
        } else {
          showMessage(data.error || 'Failed to create poll', 'error');
        }
      } catch (error) {
        showMessage('Error creating poll: ' + error.message, 'error');
      }
    });

    async function loadPolls() {
      const pollsList = document.getElementById('pollsList');
      pollsList.innerHTML = '<div class="loading">Loading polls...</div>';

      try {
        const response = await fetch(`${API_BASE}/polls`);
        const polls = await response.json();

        if (polls.length === 0) {
          pollsList.innerHTML = '<div class="no-polls">No polls created yet</div>';
          return;
        }

        let html = '<table class="polls-table"><thead><tr><th>Title</th><th>Created</th><th>Votes</th><th>Expected</th><th>Admin Token</th><th>Actions</th></tr></thead><tbody>';

        polls.forEach(poll => {
          const createdDate = new Date(poll.created_at).toLocaleDateString();
          const totalVotes = (poll.counts.date1 || 0) + (poll.counts.date2 || 0) + (poll.counts.date3 || 0) + (poll.counts.none || 0);

          html += `
            <tr>
              <td>${poll.title}</td>
              <td>${createdDate}</td>
              <td>${totalVotes}</td>
              <td>${poll.expected}</td>
              <td>
                <div class="token-display">
                  ${poll.admin_token.substring(0, 8)}...
                  <button class="copy-btn" onclick="copyToken('${poll.admin_token}')">Copy</button>
                </div>
              </td>
              <td>
                <div class="poll-actions">
                  <button onclick="window.open('/poll-vote?token=${poll.id}', '_blank')">Vote</button>
                  <button onclick="window.open('/poll-results?token=${poll.id}', '_blank')">Results</button>
                  <button class="danger" onclick="deletePoll('${poll.id}')">Delete</button>
                </div>
              </td>
            </tr>
          `;
        });

        html += '</tbody></table>';
        pollsList.innerHTML = html;

        // Auto-refresh every 5 seconds
        setTimeout(loadPolls, 5000);
      } catch (error) {
        pollsList.innerHTML = '<div class="error-message">Failed to load polls</div>';
      }
    }

    function copyToken(token) {
      navigator.clipboard.writeText(token);
      showMessage('Token copied to clipboard', 'success');
    }

    async function deletePoll(pollId) {
      if (!confirm('Are you sure you want to delete this poll?')) return;

      try {
        const response = await fetch(`${API_BASE}/polls/${pollId}`, {
          method: 'DELETE'
        });

        if (response.ok) {
          showMessage('Poll deleted successfully', 'success');
          loadPolls();
        } else {
          showMessage('Failed to delete poll', 'error');
        }
      } catch (error) {
        showMessage('Error deleting poll: ' + error.message, 'error');
      }
    }

    function showMessage(message, type) {
      const successMsg = document.getElementById('successMsg');
      const errorMsg = document.getElementById('errorMsg');

      if (type === 'success') {
        successMsg.textContent = message;
        successMsg.style.display = 'block';
        setTimeout(() => successMsg.style.display = 'none', 5000);
      } else {
        errorMsg.textContent = message;
        errorMsg.style.display = 'block';
        setTimeout(() => errorMsg.style.display = 'none', 5000);
      }
    }
  </script>
    </div>
  </div>
</body>
</html>
