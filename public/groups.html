<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Groups - Duck Playspace</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .dashboard-wrapper {
      width: 100vw;
      margin-left: calc(-50vw + 50%);
      padding: 20px;
    }

    .filters-section {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      border: 1px solid #ddd;
    }

    .filters-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 15px;
      color: #667eea;
    }

    .filters-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
    }

    .filter-group label {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 5px;
      color: #666;
    }

    .filter-group select,
    .filter-group input {
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
    }

    .filter-group select:focus,
    .filter-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.1);
    }

    .reset-filters {
      padding: 8px 16px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 600;
      align-self: flex-end;
    }

    .reset-filters:hover {
      background: #764ba2;
    }

    .data-stats {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: flex;
      gap: 20px;
      font-size: 14px;
    }

    .stat {
      display: flex;
      gap: 8px;
    }

    .stat-label {
      font-weight: 600;
      color: #666;
    }

    .stat-value {
      color: #667eea;
      font-weight: 700;
    }

    .scrollbar-top {
      width: 100vw;
      margin-left: calc(-50vw + 50%);
      overflow-x: scroll;
      overflow-y: hidden;
      height: 15px;
      background: white;
      border-top: 2px solid #667eea;
    }

    .scrollbar-top-inner {
      width: 100%;
      height: 1px;
    }

    .scrollbar-top::-webkit-scrollbar {
      height: 12px;
    }

    .scrollbar-top::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    .scrollbar-top::-webkit-scrollbar-thumb {
      background: #667eea;
      border-radius: 6px;
    }

    .scrollbar-top::-webkit-scrollbar-thumb:hover {
      background: #764ba2;
    }

    .table-wrapper {
      width: 100vw;
      margin-left: calc(-50vw + 50%);
      background: white;
      border-bottom: 2px solid #667eea;
      overflow-x: auto;
      max-height: 70vh;
      overflow-y: auto;
    }

    .dashboard-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .dashboard-table th {
      background: #667eea;
      color: white;
      padding: 12px;
      text-align: left;
      font-weight: 600;
      min-width: 120px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .dashboard-table td {
      padding: 10px 12px;
      border-bottom: 1px solid #eee;
      min-width: 120px;
    }

    .dashboard-table td:nth-child(1),
    .dashboard-table th:nth-child(1) {
      min-width: 60px;
      width: 60px;
    }

    .dashboard-table td:nth-child(3),
    .dashboard-table th:nth-child(3) {
      min-width: 50vw;
      width: 50vw;
    }

    .dashboard-table tr:hover {
      background: #f9f9f9;
    }

    .row-not-staying {
      background-color: #e0e0e0 !important;
    }

    .row-man {
      background-color: #e3f2fd;
    }

    .row-woman {
      background-color: #fce4ec;
    }

    .row-nonbinary {
      background-color: #f3e5f5;
    }

    .row-other {
      background-color: #fff3e0;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #667eea;
      font-size: 16px;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .legend {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      font-size: 13px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-color {
      width: 30px;
      height: 20px;
      border-radius: 4px;
      border: 1px solid #ddd;
    }

    .dashboard-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 20px;
      border-bottom: 2px solid #ddd;
    }

    .dashboard-tab {
      padding: 12px 20px;
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      color: #666;
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
    }

    .dashboard-tab.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }

    .dashboard-tab:hover {
      color: #667eea;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .groups-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
    }

    .group-card {
      background: white;
      border: 2px solid #667eea;
      border-radius: 10px;
      padding: 20px;
      width: 100%;
    }

    .group-title {
      font-size: 18px;
      font-weight: 700;
      color: #667eea;
      margin-bottom: 15px;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }

    .gender-subgroup {
      margin-bottom: 15px;
    }

    .gender-subgroup-title {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 10px;
      padding: 8px 10px;
      border-left: 4px solid #667eea;
      cursor: pointer;
      background: #f0f3ff;
      border-radius: 4px;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .gender-subgroup-title:hover {
      background: #e8f0ff;
    }

    .gender-subgroup-toggle {
      display: inline-block;
      transition: transform 0.3s;
    }

    .gender-subgroup-toggle.collapsed {
      transform: rotate(-90deg);
    }

    .gender-subgroup.collapsed {
      display: none;
    }

    .person-row {
      display: grid;
      grid-template-columns: 0.4fr 1.5fr 0.6fr 0.7fr 0.8fr 0.9fr 1.2fr 1.2fr 1fr 1fr 1.2fr;
      gap: 8px;
      padding: 10px;
      background: #f9f9f9;
      border-radius: 5px;
      margin-bottom: 5px;
      font-size: 11px;
      border-bottom: 1px solid #eee;
    }

    .person-number {
      font-weight: 600;
      color: #999;
      text-align: center;
    }

    .row-man {
      background-color: #e3f2fd !important;
    }

    .row-woman {
      background-color: #fce4ec !important;
    }

    .row-nonbinary {
      background-color: #f3e5f5 !important;
    }

    .row-other {
      background-color: #fff3e0 !important;
    }

    .row-not-staying {
      background-color: #e0e0e0 !important;
    }

    .person-name {
      font-weight: 600;
      color: #333;
    }

    .person-pref-age {
      color: #999;
      font-size: 11px;
    }

    .person-gender {
      color: #666;
    }

    .person-sexuality {
      color: #666;
    }

    .person-bio {
      color: #0066cc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
      cursor: pointer;
      text-decoration: underline;
    }

    .person-bio:hover {
      color: #004499;
    }

    .person-email {
      color: #0066cc;
      text-decoration: none;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
    }

    .modal-content {
      background-color: white;
      margin: 10% auto;
      padding: 20px;
      border: 2px solid #667eea;
      border-radius: 10px;
      width: 80%;
      max-width: 600px;
      max-height: 70vh;
      overflow-y: auto;
    }

    .modal-header {
      font-size: 18px;
      font-weight: 700;
      color: #667eea;
      margin-bottom: 15px;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }

    .modal-close {
      color: #667eea;
      float: right;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
      line-height: 20px;
    }

    .modal-close:hover {
      color: #764ba2;
    }

    .modal-bio-text {
      font-size: 13px;
      color: #333;
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
  </style>
</head>
<body>
  <div class="page-container">
    <div class="page-bg grid-bg"></div>

    <div class="container">
      <header class="header">
        <div>
          <div style="display: flex; align-items: center; gap: 1rem;">
            <img src="images/DDA-logo.png" alt="DDA Logo" style="height: 50px; width: auto;">
            <h1>Duck Playspace</h1>
          </div>
          <div class="header-subtitle">Analytics & Insights</div>
        </div>
        <button id="logoutBtn" class="btn btn-logout">Logout</button>
      </header>

      <nav class="navbar">
        <a href="/home" class="nav-link">Home</a>
        <a href="/poll" class="nav-link">Polls</a>
        <a href="/upload-data" class="nav-link">Upload Data</a>
        <a href="/data-filters" class="nav-link">Data</a>
        <a href="/groups" class="nav-link active">Groups</a>
        <a href="/events" class="nav-link">Dates</a>
        <a href="/dashboard" class="nav-link">Dashboard</a>
      </nav>

      <main class="content">
        <div class="dashboard-wrapper">
          <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Loading data...</p>
          </div>

          <div id="dashboardContent" style="display: none;">
            <div class="groups-container" id="groupsContainer">
              <p>Loading groups...</p>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
    let allData = [];
    let filteredData = [];
    const filters = {};

    async function loadDashboard() {
      try {
        const response = await fetch('/api/dashboard-data');
        allData = await response.json();

        document.getElementById('loading').style.display = 'none';
        document.getElementById('dashboardContent').style.display = 'block';

        displayGroups();
      } catch (err) {
        console.error('Failed to load groups:', err);
      }
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      try {
        const response = await fetch('/logout', { method: 'POST' });
        const data = await response.json();
        if (data.success) {
          window.location.href = '/';
        }
      } catch (err) {
        console.error('Logout failed:', err);
      }
    });

// Categorize people into groups
    function categorizeGroups() {
      const groups = {
        'Mono Long-Term': [],
        'Mono Casual': [],
        'Poly/ENM Long-Term': [],
        'Poly/ENM Casual': [],
        'Friends': [],
        'LGBTQ+': []
      };

      allData.forEach(person => {
        const relationshipStyle = person['Relationship Style'] || '';
        const mainIntention = person['Main Intention'] || '';
        const gender = person['Gender'] || '';
        const sexuality = person['Sexuality'] || '';

        // Determine relationship style
        const isMono = relationshipStyle.toLowerCase().includes('mono');
        const isPoly = relationshipStyle.toLowerCase().includes('poly') || relationshipStyle.toLowerCase().includes('enm');

        // Determine main intention
        const isLongTerm = mainIntention.toLowerCase().includes('long');
        const isCasual = mainIntention.toLowerCase().includes('casual');
        const isFriends = mainIntention.toLowerCase().includes('friend');

        // Determine LGBTQ+
        const isLGBTQ = gender !== 'Man' && gender !== 'Woman' && gender !== '' || sexuality.toLowerCase().includes('gay') || sexuality.toLowerCase().includes('lesbian') || sexuality.toLowerCase().includes('bi');

        // Add to appropriate groups based on combinations
        if (isMono && isLongTerm) groups['Mono Long-Term'].push(person);
        if (isMono && isCasual) groups['Mono Casual'].push(person);
        if (isPoly && isLongTerm) groups['Poly/ENM Long-Term'].push(person);
        if (isPoly && isCasual) groups['Poly/ENM Casual'].push(person);
        if (isFriends) groups['Friends'].push(person);
        if (isLGBTQ) groups['LGBTQ+'].push(person);
      });

      return groups;
    }

    // Display groups with gender subgroups
    function displayGroups() {
      const groups = categorizeGroups();
      const container = document.getElementById('groupsContainer');
      container.innerHTML = '';

      Object.entries(groups).forEach(([groupName, people]) => {
        const card = document.createElement('div');
        card.className = 'group-card';

        const title = document.createElement('div');
        title.className = 'group-title';
        title.textContent = `${groupName} (${people.length})`;
        card.appendChild(title);

        // Group by gender
        const byGender = {};
        people.forEach(person => {
          const gender = person['Gender'] || 'Not Specified';
          if (!byGender[gender]) byGender[gender] = [];
          byGender[gender].push(person);
        });

        // Display each gender group sorted by age
        Object.entries(byGender).forEach(([gender, genderPeople]) => {
          const genderTitle = document.createElement('div');
          genderTitle.className = 'gender-subgroup-title';

          const toggle = document.createElement('span');
          toggle.className = 'gender-subgroup-toggle';
          toggle.textContent = '▼';

          const titleText = document.createElement('span');
          titleText.textContent = `${gender} (${genderPeople.length})`;

          genderTitle.appendChild(toggle);
          genderTitle.appendChild(titleText);
          card.appendChild(genderTitle);

          const subgroup = document.createElement('div');
          subgroup.className = 'gender-subgroup';

          // Add click handler to toggle subgroup
          genderTitle.addEventListener('click', () => {
            subgroup.classList.toggle('collapsed');
            toggle.classList.toggle('collapsed');
          });

          // Sort by age ascending
          genderPeople.sort((a, b) => {
            const ageA = parseInt(a['Age'] || 0);
            const ageB = parseInt(b['Age'] || 0);
            return ageA - ageB;
          });

          genderPeople.forEach((person, index) => {
            const row = document.createElement('div');
            row.className = 'person-row';

            const name = person['Name'] || person['Email'] || 'Unknown';
            const age = person['Age'] || '?';
            const prefMin = person['Preferred Age Min'] || person['Age Preference Min'] || '?';
            const prefMax = person['Preferred Age Max'] || person['Age Preference Max'] || '?';
            const genderValue = person['Gender'] || '?';
            const attractedTo = person['Attracted To'] || '?';
            const sexuality = person['Sexuality'] || '?';
            const bio = person['Bio'] || '';
            const email = person['Email'] || '?';
            const venuePreferences = person['Venue Preferences'] || '?';
            const relationshipStyle = person['Relationship Style'] || '?';
            const mainIntention = person['Main Intention'] || '?';
            const stayingInBerlin = person['Staying In Berlin'] || '';

            // Apply color coding based on gender
            if (genderValue === 'Man') row.classList.add('row-man');
            else if (genderValue === 'Woman') row.classList.add('row-woman');
            else if (genderValue === 'Non-binary') row.classList.add('row-nonbinary');
            else row.classList.add('row-other');

            // Override with grey if not staying in Berlin
            if (stayingInBerlin === 'No') {
              row.classList.remove('row-man', 'row-woman', 'row-nonbinary', 'row-other');
              row.classList.add('row-not-staying');
            }

            row.innerHTML = `
              <div class="person-number">${index + 1}</div>
              <div class="person-name">${name} (${age})</div>
              <div class="person-pref-age">${prefMin}-${prefMax}</div>
              <div class="person-gender">${genderValue}</div>
              <div>${attractedTo}</div>
              <div class="person-sexuality">${sexuality}</div>
              <div class="person-bio" onclick="openBioModal('${name}', '${bio.replace(/'/g, "\\'")}')">${bio.substring(0, 50) || '-'}${bio.length > 50 ? '...' : ''}</div>
              <div class="person-email">${email}</div>
              <div>${venuePreferences}</div>
              <div>${relationshipStyle}</div>
              <div>${mainIntention}</div>
            `;

            subgroup.appendChild(row);
          });

          card.appendChild(subgroup);
        });

        container.appendChild(card);
      });
    }

    // Bio Modal functionality
    function openBioModal(name, bio) {
      const modal = document.getElementById('bioModal');
      const bioText = document.getElementById('bioText');
      const modalHeader = document.getElementById('modalHeader');
      modalHeader.textContent = `${name}'s Bio`;
      bioText.textContent = bio;
      modal.style.display = 'block';
    }

    function closeBioModal() {
      const modal = document.getElementById('bioModal');
      modal.style.display = 'none';
    }

    window.onclick = function(event) {
      const modal = document.getElementById('bioModal');
      if (event.target === modal) {
        modal.style.display = 'none';
      }
    }

    // Load data on page load
    loadDashboard();
  </script>

  <!-- Bio Modal -->
  <div id="bioModal" class="modal">
    <div class="modal-content">
      <span class="modal-close" onclick="closeBioModal()">&times;</span>
      <div class="modal-header" id="modalHeader">Bio</div>
      <div class="modal-bio-text" id="bioText"></div>
    </div>
  </div>
</body>
</html>
