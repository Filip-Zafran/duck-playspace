<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dates - Duck Playspace</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .dashboard-wrapper {
      width: 100vw;
      margin-left: calc(-50vw + 50%);
      padding: 20px;
    }

    .dates-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
    }

    .date-card {
      background: white;
      border: 2px solid #667eea;
      border-radius: 10px;
      padding: 20px;
    }

    .date-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid #667eea;
    }

    .date-title {
      font-size: 18px;
      font-weight: 700;
      color: #667eea;
    }

    .date-status {
      display: flex;
      gap: 20px;
      font-size: 12px;
    }

    .status-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .status-label {
      font-weight: 600;
      color: #666;
    }

    .status-value {
      color: #667eea;
      font-weight: 700;
      font-size: 14px;
    }

    .date-actions {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .btn-copy-emails {
      padding: 8px 16px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
    }

    .btn-copy-emails:hover {
      background: #764ba2;
    }

    .venue-stats {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
    }

    .venue-stat {
      text-align: center;
    }

    .venue-name {
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .venue-bar {
      height: 30px;
      background: #e0e0e0;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 5px;
    }

    .venue-fill {
      height: 100%;
      background: #667eea;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 11px;
      font-weight: 600;
    }

    .venue-count {
      font-size: 12px;
      color: #666;
    }

    .slots-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .gender-column {
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      padding: 15px;
      background: #f9f9f9;
    }

    .gender-column.woman {
      background: #ffe0e0;
      border-color: #ff6b9d;
    }

    .gender-column.man {
      background: #e3f2fd;
      border-color: #667eea;
    }

    .gender-column-title {
      font-size: 14px;
      font-weight: 700;
      color: #333;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid #667eea;
    }

    .gender-column.woman .gender-column-title {
      border-bottom-color: #ff6b9d;
      color: #c2185b;
    }

    .gender-column.man .gender-column-title {
      color: #1565c0;
    }

    .primary-slots {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 15px;
    }

    .primary-slot {
      background: white;
      border: 2px dashed #667eea;
      border-radius: 8px;
      padding: 12px;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.3s;
      color: #999;
      font-size: 12px;
    }

    .primary-slot.filled {
      border-style: solid;
      background: #e3f2fd;
      flex-direction: column;
      align-items: flex-start;
    }

    .gender-column.woman .primary-slot.filled {
      background: #ffe0e0;
      border-color: #ff6b9d;
    }

    .gender-column.man .primary-slot.filled {
      background: #e3f2fd;
      border-color: #667eea;
    }

    .slot-person {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
      margin-bottom: 8px;
    }

    .slot-person-name {
      font-weight: 600;
      color: #333;
      font-size: 12px;
    }

    .slot-person-details {
      font-size: 11px;
      color: #666;
    }

    .slot-remove {
      padding: 4px 8px;
      background: #ff6b6b;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
    }

    .slot-remove:hover {
      background: #c92a2a;
    }

    .backup-people {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .backup-title {
      font-size: 12px;
      font-weight: 600;
      color: #666;
      margin-top: 10px;
      margin-bottom: 10px;
    }

    .person-card {
      background: white;
      padding: 12px;
      border-radius: 8px;
      border-left: 4px solid #667eea;
      font-size: 11px;
      position: relative;
      cursor: pointer;
      transition: all 0.2s;
    }

    .person-card:hover {
      background: #f0f3ff;
    }

    .person-card.age-mismatch {
      border-left-color: #ff6b6b;
      background: #ffe0e0;
    }

    .person-info {
      flex: 1;
      margin-bottom: 8px;
    }

    .person-name {
      font-weight: 600;
      color: #333;
      margin-bottom: 4px;
    }

    .person-details {
      color: #666;
      font-size: 10px;
      line-height: 1.4;
      margin-bottom: 4px;
    }

    .person-meta {
      color: #666;
      font-size: 10px;
      line-height: 1.4;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .meta-item {
      word-break: break-word;
    }

    .meta-label {
      font-weight: 600;
      color: #333;
    }

    .person-card-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .btn-assign {
      padding: 4px 8px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 10px;
      font-weight: 600;
    }

    .btn-assign:hover {
      background: #764ba2;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #667eea;
      font-size: 16px;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .no-dates {
      text-align: center;
      padding: 40px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="page-container">
    <div class="page-bg grid-bg"></div>

    <div class="container">
      <header class="header">
        <div>
          <div style="display: flex; align-items: center; gap: 1rem;">
            <img src="images/DDA-logo.png" alt="DDA Logo" style="height: 50px; width: auto;">
            <h1>Duck Playspace</h1>
          </div>
          <div class="header-subtitle">Event Matching</div>
        </div>
        <button id="logoutBtn" class="btn btn-logout">Logout</button>
      </header>

      <nav class="navbar">
        <a href="/home" class="nav-link">Home</a>
        <a href="/poll" class="nav-link">Polls</a>
        <a href="/upload-data" class="nav-link">Upload Data</a>
        <a href="/data-filters" class="nav-link">Data</a>
        <a href="/groups" class="nav-link">Groups</a>
        <a href="/dates" class="nav-link active">Dates</a>
      </nav>

      <main class="content">
        <div class="dashboard-wrapper">
          <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Loading dates...</p>
          </div>

          <div id="datesContent" style="display: none;">
            <div class="dates-container" id="datesContainer"></div>
            <div class="no-dates" id="noDates" style="display: none;">
              No valid dates found. Need minimum 6 women + 6 men for regular groups, or 12 people for LGBTQ+.
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
    let allData = [];
    let dates = {};
    let selections = {};

    async function loadDates() {
      try {
        const response = await fetch('/api/dashboard-data');
        allData = await response.json();

        generateDates();
        displayDates();

        document.getElementById('loading').style.display = 'none';
        document.getElementById('datesContent').style.display = 'block';
      } catch (err) {
        console.error('Failed to load dates:', err);
      }
    }

    function generateDates() {
      const dateGroups = {
        'Mono Long-Term': [],
        'Mono Casual': [],
        'Poly/ENM Long-Term': [],
        'Poly/ENM Casual': [],
        'Friends': [],
        'LGBTQ+': []
      };

      // Categorize people
      allData.forEach(person => {
        const relationshipStyle = person['Relationship Style'] || '';
        const mainIntention = person['Main Intention'] || '';
        const gender = person['Gender'] || '';
        const sexuality = person['Sexuality'] || '';

        const isMono = relationshipStyle.toLowerCase().includes('mono');
        const isPoly = relationshipStyle.toLowerCase().includes('poly') || relationshipStyle.toLowerCase().includes('enm');
        const isLongTerm = mainIntention.toLowerCase().includes('long');
        const isCasual = mainIntention.toLowerCase().includes('casual');
        const isFriends = mainIntention.toLowerCase().includes('friend');
        const isLGBTQ = gender !== 'Man' && gender !== 'Woman' && gender !== '' || sexuality.toLowerCase().includes('gay') || sexuality.toLowerCase().includes('lesbian') || sexuality.toLowerCase().includes('bi');

        if (isMono && isLongTerm) dateGroups['Mono Long-Term'].push(person);
        if (isMono && isCasual) dateGroups['Mono Casual'].push(person);
        if (isPoly && isLongTerm) dateGroups['Poly/ENM Long-Term'].push(person);
        if (isPoly && isCasual) dateGroups['Poly/ENM Casual'].push(person);
        if (isFriends) dateGroups['Friends'].push(person);
        if (isLGBTQ) dateGroups['LGBTQ+'].push(person);
      });

      // Check which groups qualify as dates
      Object.entries(dateGroups).forEach(([groupName, people]) => {
        if (groupName === 'LGBTQ+') {
          if (people.length >= 12) {
            dates[groupName] = people;
          }
        } else {
          const womenCount = people.filter(p => p['Gender'] === 'Woman').length;
          const menCount = people.filter(p => p['Gender'] === 'Man').length;
          if (womenCount >= 6 && menCount >= 6) {
            dates[groupName] = people;
          }
        }
      });
    }

    function displayDates() {
      const container = document.getElementById('datesContainer');
      const noDates = document.getElementById('noDates');

      if (Object.keys(dates).length === 0) {
        noDates.style.display = 'block';
        return;
      }

      container.innerHTML = '';

      Object.entries(dates).forEach(([dateName, people]) => {
        const card = document.createElement('div');
        card.className = 'date-card';

        const womenCount = people.filter(p => p['Gender'] === 'Woman').length;
        const menCount = people.filter(p => p['Gender'] === 'Man').length;
        const totalCount = people.length;

        const headerHTML = `
          <div class="date-header">
            <div class="date-title">${dateName}</div>
            <div class="date-status">
              <div class="status-item">
                <span class="status-label">Women</span>
                <span class="status-value">${womenCount}</span>
              </div>
              <div class="status-item">
                <span class="status-label">Men</span>
                <span class="status-value">${menCount}</span>
              </div>
              <div class="status-item">
                <span class="status-label">Total</span>
                <span class="status-value">${totalCount}</span>
              </div>
            </div>
          </div>
        `;

        const venueStats = getVenueStats(people);
        const venueHTML = createVenueStatsHTML(venueStats);

        const actionsHTML = `
          <div class="date-actions">
            <button class="btn-copy-emails" onclick="copyEmails('${dateName}')">📋 Copy Primary Emails</button>
          </div>
        `;

        const slotsHTML = createSlotsHTML(dateName, people);

        card.innerHTML = headerHTML + actionsHTML + venueHTML + slotsHTML;
        container.appendChild(card);
      });
    }

    function getVenueStats(people) {
      const venues = { 'Bar': 0, 'Café': 0, 'Park': 0, 'Boulder Hall': 0 };

      people.forEach(person => {
        const prefs = person['Venue Preferences'] || '';
        Object.keys(venues).forEach(venue => {
          if (prefs.toLowerCase().includes(venue.toLowerCase())) {
            venues[venue]++;
          }
        });
      });

      return venues;
    }

    function createVenueStatsHTML(venues) {
      const maxVotes = Math.max(...Object.values(venues), 1);
      let html = '<div class="venue-stats">';

      Object.entries(venues).forEach(([venue, count]) => {
        const percentage = (count / maxVotes) * 100;
        html += `
          <div class="venue-stat">
            <div class="venue-name">${venue}</div>
            <div class="venue-bar">
              <div class="venue-fill" style="width: ${percentage}%">
                ${count}
              </div>
            </div>
            <div class="venue-count">${count} votes</div>
          </div>
        `;
      });

      html += '</div>';
      return html;
    }

    function createSlotsHTML(dateName, people) {
      const women = people.filter(p => p['Gender'] === 'Woman');
      const men = people.filter(p => p['Gender'] === 'Man');
      const others = people.filter(p => p['Gender'] !== 'Woman' && p['Gender'] !== 'Man');

      let html = '<div class="slots-container">';

      // Women column
      html += createGenderColumn(dateName, 'Woman', women);

      // Men column
      html += createGenderColumn(dateName, 'Man', men);

      html += '</div>';

      // Others if LGBTQ+
      if (others.length > 0) {
        html += createGenderColumn(dateName, 'Other', others);
      }

      return html;
    }

    function createGenderColumn(dateName, gender, people) {
      const genderClass = gender === 'Woman' ? 'woman' : gender === 'Man' ? 'man' : 'other';
      let html = `<div class="gender-column ${genderClass}">
        <div class="gender-column-title">${gender}</div>
        <div class="primary-slots">`;

      for (let i = 0; i < 4; i++) {
        const slotKey = `${dateName}:${gender}:${i}`;
        const person = selections[slotKey];

        if (person) {
          html += `
            <div class="primary-slot filled">
              <div class="slot-person">
                <div class="slot-person-name">${person.Name || person.Email}</div>
                <div class="slot-person-details">${person.Age} yrs</div>
              </div>
              <button class="slot-remove" onclick="removeFromSlot('${slotKey}')">Remove</button>
            </div>
          `;
        } else {
          html += `<div class="primary-slot">+ Empty slot</div>`;
        }
      }

      html += '</div><div class="backup-title">Backups:</div><div class="backup-people">';

      people.forEach(person => {
        const email = person['Email'] || '';
        const isSlotted = Object.values(selections).some(p => p && p['Email'] === email);

        if (!isSlotted) {
          const age = person['Age'] || '?';
          const prefMin = person['Preferred Age Min'] || person['Age Preference Min'] || '?';
          const prefMax = person['Preferred Age Max'] || person['Age Preference Max'] || '?';
          const sexuality = person['Sexuality'] || '?';
          const language = person['Language'] || person['Languages'] || person['language'] || person['languages'] || '?';
          const mainIntention = person['Main Intention'] || '?';
          const relationshipStyle = person['Relationship Style'] || '?';
          const isAgeMismatch = checkAgeMismatch(person);
          const mismatchClass = isAgeMismatch ? 'age-mismatch' : '';

          html += `
            <div class="person-card ${mismatchClass}">
              <div class="person-info">
                <div class="person-name">${person.Name || email}</div>
                <div class="person-details">
                  ${age} yrs | Prefers: ${prefMin}-${prefMax}
                  ${isAgeMismatch ? ' | ⚠️ Age mismatch' : ''}
                </div>
                <div class="person-meta">
                  <div class="meta-item"><span class="meta-label">Sexuality:</span> ${sexuality}</div>
                  <div class="meta-item"><span class="meta-label">Language:</span> ${language}</div>
                  <div class="meta-item"><span class="meta-label">Intention:</span> ${mainIntention}</div>
                  <div class="meta-item"><span class="meta-label">Rel. Style:</span> ${relationshipStyle}</div>
                </div>
              </div>
              <div class="person-card-footer">
                <button class="btn-assign" onclick="assignToPrimary('${dateName}', '${gender}', '${email.replace(/'/g, "\\'")}')">Assign</button>
              </div>
            </div>
          `;
        }
      });

      html += '</div></div>';
      return html;
    }

    function checkAgeMismatch(person) {
      const age = parseInt(person['Age'] || 0);
      const prefMin = parseInt(person['Preferred Age Min'] || person['Age Preference Min'] || 0);
      const prefMax = parseInt(person['Preferred Age Max'] || person['Age Preference Max'] || 0);

      if (prefMin === 0 || prefMax === 0) return false;
      return age < prefMin || age > prefMax;
    }

    function assignToPrimary(dateName, gender, email) {
      const allPeople = dates[dateName];
      const person = allPeople.find(p => (p['Email'] || '') === email);

      if (!person) return;

      // Find first available slot
      for (let i = 0; i < 4; i++) {
        const slotKey = `${dateName}:${gender}:${i}`;
        if (!selections[slotKey]) {
          selections[slotKey] = person;
          displayDates();
          return;
        }
      }

      alert('All primary slots for this gender are full!');
    }

    function removeFromSlot(slotKey) {
      delete selections[slotKey];
      displayDates();
    }

    function copyEmails(dateName) {
      const emails = Object.values(selections)
        .filter(p => {
          // Check if this person belongs to this date
          const personKey = Object.keys(selections).find(k => selections[k] === p);
          return personKey && personKey.startsWith(dateName + ':');
        })
        .map(p => p['Email'] || '')
        .filter(e => e);

      if (emails.length === 0) {
        alert('No primary choices selected yet.');
        return;
      }

      const emailList = emails.join(', ');
      navigator.clipboard.writeText(emailList).then(() => {
        alert(`✅ Copied ${emails.length} email(s) to clipboard!`);
      });
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      try {
        const response = await fetch('/logout', { method: 'POST' });
        const data = await response.json();
        if (data.success) {
          window.location.href = '/';
        }
      } catch (err) {
        console.error('Logout failed:', err);
      }
    });

    loadDates();
  </script>
</body>
</html>
