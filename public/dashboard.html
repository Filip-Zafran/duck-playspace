<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Duck Playspace</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .dashboard-container {
      max-width: 1200px;
      margin: 30px auto;
      padding: 30px;
    }

    .coming-soon {
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
      border: 2px solid #667eea;
      border-radius: 10px;
      padding: 60px 30px;
      text-align: center;
    }

    .coming-soon h2 {
      color: #667eea;
      font-size: 32px;
      margin-bottom: 20px;
    }

    .coming-soon p {
      color: #666;
      font-size: 18px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="page-container">
    <div class="page-bg grid-bg"></div>

    <div class="container">
      <header class="header">
        <div>
          <div style="display: flex; align-items: center; gap: 1rem;">
            <img src="images/DDA-logo.png" alt="DDA Logo" style="height: 50px; width: auto;">
            <h1>Duck Playspace</h1>
          </div>
          <div class="header-subtitle">Analytics & Insights</div>
        </div>
        <button id="logoutBtn" class="btn btn-logout">Logout</button>
      </header>

      <nav class="navbar">
        <a href="/home" class="nav-link">Home</a>
        <a href="/poll" class="nav-link">Polls</a>
        <a href="/upload-data" class="nav-link">Upload Data</a>
        <a href="/dashboard" class="nav-link active">Dashboard</a>
      </nav>

      <main class="content">
        <div class="dashboard-container">
          <div class="coming-soon">
            <h2>Dashboard</h2>
            <p>Filters, functionalities, and automations coming soon!</p>
            <p style="font-size: 14px; color: #999; margin-top: 20px;">Start by uploading data in the "Upload Data" section to see analytics here.</p>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      try {
        const response = await fetch('/logout', { method: 'POST' });
        const data = await response.json();
        if (data.success) {
          window.location.href = '/';
        }
      } catch (err) {
        console.error('Logout failed:', err);
      }
    });
  </script>
</body>
</html>
