<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vote on Poll</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f5f5f5;
      min-height: 100vh;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      background: #ffffff;
      border: 3px solid #171717;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 8px 8px 0 #171717;
    }

    .header {
      background: #ffd84d;
      padding: 24px;
      text-align: center;
      border-bottom: 3px solid #171717;
    }

    .header img {
      max-width: 180px;
      height: auto;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 28px;
      line-height: 1.2;
      margin-bottom: 8px;
      color: #171717;
    }

    .header-subtitle {
      font-size: 16px;
      color: #171717;
      margin-bottom: 0;
    }

    .content {
      padding: 24px;
    }

    .intro {
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 20px;
      color: #171717;
    }

    .card {
      border: 3px solid #171717;
      border-radius: 18px;
      padding: 18px;
      margin: 22px 0;
      box-shadow: 5px 8px 0 #171717;
    }

    .card h2 {
      font-size: 22px;
      margin-top: 0;
      margin-bottom: 12px;
      color: #171717;
    }

    .card p {
      font-size: 16px;
      line-height: 1.6;
      color: #171717;
      margin-bottom: 12px;
    }

    .card p:last-child {
      margin-bottom: 0;
    }

    .card-dates {
      background: #b9f3ff;
    }

    .card-payment {
      background: #ffe66d;
    }

    .card-cancellation {
      background: #ffb07c;
    }

    .card-group {
      background: #ff9bd2;
    }

    .card-faq {
      background: #d8c7ff;
    }

    .card-important {
      background: #f0f0f0;
    }

    .card-cannot-attend {
      background: #ffb07c;
    }

    .date-option {
      background: white;
      border: 3px solid #171717;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
    }

    .date-option:hover {
      background: #f0f0f0;
    }

    .date-option.selected {
      background: #e3f2fd;
      border-color: #2196f3;
    }

    .date-option input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-right: 12px;
      cursor: pointer;
      accent-color: #171717;
    }

    .date-option label {
      flex: 1;
      cursor: pointer;
      font-weight: 500;
      color: #171717;
    }

    .date-value {
      font-weight: 700;
      color: #171717;
    }

    .time-value {
      font-size: 14px;
      color: #666;
      display: block;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: 600;
      color: #171717;
      margin-bottom: 8px;
      font-size: 16px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      border: 3px solid #171717;
      border-radius: 12px;
      font-size: 16px;
      box-sizing: border-box;
    }

    input[type="text"]:focus {
      outline: none;
      background: #f0f0f0;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      margin-bottom: 24px;
    }

    button {
      flex: 1;
      padding: 14px 24px;
      border: 3px solid #171717;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-submit {
      background: #171717;
      color: white;
    }

    .btn-submit:hover:not(:disabled) {
      background: #333;
    }

    .btn-submit:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .btn-results {
      background: #95a5a6;
      color: white;
    }

    .btn-results:hover {
      background: #7f8c8d;
    }

    .payment-timer {
      font-size: 24px;
      font-weight: 700;
      color: #171717;
      margin: 16px 0;
    }

    .payment-link {
      display: inline-block;
      background: #171717;
      color: white;
      text-decoration: none;
      font-size: 16px;
      font-weight: 700;
      padding: 12px 20px;
      border-radius: 12px;
      border: 2px solid #171717;
      margin: 12px 0;
    }

    .collapsible {
      cursor: pointer;
      font-weight: 700;
      color: #171717;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .collapsible::after {
      content: "▼";
      font-size: 12px;
      transition: transform 0.3s;
    }

    .collapsible.collapsed::after {
      transform: rotate(-90deg);
    }

    .collapsible-content {
      max-height: 1000px;
      overflow: hidden;
      transition: max-height 0.3s ease;
      margin-top: 12px;
    }

    .collapsible-content.hidden {
      max-height: 0;
      margin-top: 0;
    }

    .success-message {
      background: #d4edda;
      color: #155724;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      text-align: center;
      font-weight: 600;
    }

    .footer-image {
      text-align: center;
      margin-top: 30px;
    }

    .footer-image img {
      max-width: 320px;
      height: auto;
    }

    .error {
      background: #f8d7da;
      color: #721c24;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
      font-size: 18px;
    }

    .backup-message {
      background: #e8f4ff;
      border-left: 4px solid #667eea;
      padding: 12px;
      border-radius: 5px;
      margin-top: 10px;
      display: none;
      font-size: 14px;
      color: #333;
      line-height: 1.5;
    }

    .backup-message.active {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="loading">Loading poll...</div>
  </div>

  <script>
    const API_BASE = '/api';
    let pollId = null;
    let timerInterval = null;
    let votingEnded = false;

    async function loadPoll() {
      const params = new URLSearchParams(window.location.search);
      pollId = params.get('token');
      const preselect = params.get('preselect');

      if (!pollId) {
        document.getElementById('app').innerHTML = '<div class="error">Poll ID not provided</div>';
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/vote/${pollId}`);
        if (!response.ok) {
          throw new Error('Poll not found');
        }

        const poll = await response.json();
        renderPoll(poll);
        startTimer(poll.timer_end);

        // Auto-select option if preselect parameter is provided
        if (preselect) {
          setTimeout(() => {
            const checkbox = document.getElementById(preselect);
            if (checkbox) {
              checkbox.checked = true;
              checkbox.closest('.date-option').classList.add('selected');
              handleChoiceChange(checkbox);
            }
          }, 100);
        }
      } catch (error) {
        document.getElementById('app').innerHTML = `<div class="error">${error.message}</div>`;
      }
    }

    function renderPoll(poll) {
      const timerHtml = poll.timer_end ? `
        <div id="timerDisplay" class="card card-payment" style="text-align: center;">
          <div style="font-size: 14px; color: #171717; margin-bottom: 8px;">Time remaining to confirm</div>
          <div style="font-size: 28px; font-weight: 700; color: #171717;">Calculating...</div>
        </div>
      ` : '';

      const html = `
        <div class="header">
          <img src="images/DDA-logo.png" alt="Duck Dating Apps logo">
          <h1>${poll.title}</h1>
          <div class="header-subtitle">${poll.description}</div>
        </div>

        <div class="content">
          <p class="intro">Hi everyone,</p>
          <p class="intro">Great news! We have an event coming up. Here are the details:</p>

          <form id="voteForm">
            <!-- Dates Card -->
            <div class="card card-dates">
              <h2>Select your availability</h2>
              <p style="margin-bottom: 16px;">You can select multiple dates</p>

              <div class="date-option" data-choice="date1">
                <input type="checkbox" id="date1" name="choice" value="date1">
                <label for="date1">
                  <span class="date-value">${formatDate(poll.date1)}</span>
                  ${poll.time1 ? `<span class="time-value">${poll.time1}</span>` : ''}
                </label>
              </div>

              <div class="date-option" data-choice="date2">
                <input type="checkbox" id="date2" name="choice" value="date2">
                <label for="date2">
                  <span class="date-value">${formatDate(poll.date2)}</span>
                  ${poll.time2 ? `<span class="time-value">${poll.time2}</span>` : ''}
                </label>
              </div>

              <div class="date-option" data-choice="date3">
                <input type="checkbox" id="date3" name="choice" value="date3">
                <label for="date3">
                  <span class="date-value">${formatDate(poll.date3)}</span>
                  ${poll.time3 ? `<span class="time-value">${poll.time3}</span>` : ''}
                </label>
              </div>

              <div class="date-option" data-choice="none">
                <input type="checkbox" id="none" name="choice" value="none">
                <label for="none">
                  <span class="date-value">I can't make it this month</span>
                </label>
                <div class="backup-message" id="backupMessage">
                  No worries, we will invite someone from the backup list
                </div>
              </div>
            </div>

            <!-- Meeting Details Card -->
            <div class="card" style="background: #8ff0c4;">
              <h2>Meeting details</h2>
              <p style="margin: 8px 0;">
                <strong>Event:</strong> ${poll.title}
              </p>
              <p style="margin: 8px 0;">
                <strong>Expected Attendees:</strong> ${poll.expected || '0'}
              </p>
              <p style="margin: 8px 0;">
                <strong>Location:</strong> ${poll.location || 'TBD'}
                ${poll.location ? '<div style="font-size: 12px; color: #555; margin-top: 4px; font-style: italic;">Exact bar location will be revealed to confirmed participants</div>' : ''}
              </p>
            </div>

            <!-- What This Group Is About -->
            ${poll.about_section ? `
              <div class="card" style="background: #d8c7ff;">
                <h2>What this group is about</h2>
                <p>${poll.about_section}</p>
              </div>
            ` : ''}

            <!-- Payment Card -->
            ${timerHtml}

            <div class="card card-payment">
              <h2>Confirm your participation</h2>
              <p>To confirm your spot, please send the <strong>5€ participation fee</strong> via PayPal in the next 24h</p>
              <div style="text-align: center;">
                <a href="https://paypal.me/fichozee" class="payment-link">Pay 5€ via PayPal</a>
              </div>
              <p>Please select <strong>Friends & Family</strong>, as we are still in a testing phase.</p>
              <p style="margin-top: 15px; font-weight: 600;">Thank you for understanding!</p>
              <p>For questions contact: <a href="mailto:duckdatingapps@gmail.com" style="color: #ff5b92; text-decoration: underline;">duckdatingapps@gmail.com</a></p>
            </div>

            <!-- Group Dynamics Card -->
            ${poll.participation_section ? `
              <div class="card card-group">
                <div class="collapsible" onclick="toggleCollapsible('groupsetup')">
                  <h2 style="margin: 0;">Group Dynamics</h2>
                </div>
                <div class="collapsible-content" id="groupsetup">
                  <ul style="margin: 10px 0; padding-left: 20px; list-style: none;">
                    ${poll.participation_section.split('\n').filter(line => line.trim()).map(line => `<li style="margin-bottom: 8px; padding-left: 20px; position: relative;"><span style="position: absolute; left: 0;">•</span>${line.trim()}</li>`).join('')}
                  </ul>
                </div>
              </div>
            ` : ''}


            <!-- FAQ Card -->
            ${poll.faq_link ? `
              <div class="card card-faq">
                <div class="collapsible collapsed" onclick="toggleCollapsible('faq')">
                  <h2 style="margin: 0;">Questions?</h2>
                </div>
                <div class="collapsible-content hidden" id="faq">
                  <p>You can check our FAQs here:</p>
                  <a href="${poll.faq_link}" target="_blank" class="payment-link" style="display: inline-block;">Read the FAQs</a>
                </div>
              </div>
            ` : ''}

            <!-- Important Card -->
            <div class="card card-important">
              <div class="collapsible collapsed" onclick="toggleCollapsible('important')">
                <h2 style="margin: 0;">Important</h2>
              </div>
              <div class="collapsible-content hidden" id="important">
                <p>${poll.important_section || 'Please review important information about this event before confirming your participation.'}</p>
              </div>
            </div>

            <!-- Cancellation Policy Card -->
            <div class="card card-cancellation">
              <div class="collapsible collapsed" onclick="toggleCollapsible('cancellation')">
                <h2 style="margin: 0;">Cancellation Policy</h2>
              </div>
              <div class="collapsible-content hidden" id="cancellation">
                <p><strong>No refunds policy applies.</strong></p>
                <p>Once you confirm your participation by sending the 5€ payment, your spot is reserved. We understand that plans can change, but we ask that you honor your commitment to the group.</p>
                <p>Here's why this policy matters:</p>
                <ul style="margin: 15px 0; padding-left: 20px;">
                  <li>We organize group activities based on confirmed headcount to ensure everyone has a great experience</li>
                  <li>Your payment helps us secure the venue and make necessary arrangements</li>
                  <li>Last-minute cancellations can disrupt group dynamics and make it harder to fill your spot</li>
                  <li>This policy ensures fairness to all members who show up and honor their commitments</li>
                </ul>
                <p style="margin-top: 15px;"><strong>If you need to cancel:</strong> Please let us know as soon as possible so we can offer your spot to someone from our waitlist. While refunds cannot be issued, we appreciate your courtesy in informing us promptly.</p>
              </div>
            </div>

            <!-- Name Input -->
            <div class="form-group">
              <label for="voterName">Your Name *</label>
              <input type="text" id="voterName" name="voter_name" placeholder="Enter your name" required>
            </div>

            <!-- Email Input -->
            <div class="form-group">
              <label for="voterEmail">Your e-mail *</label>
              <input type="text" id="voterEmail" name="voter_email" placeholder="Enter your email" required>
            </div>

            <!-- Buttons -->
            <div class="button-group">
              <button type="submit" class="btn-submit" ${votingEnded ? 'disabled' : ''}>Submit Vote</button>
              <button type="button" class="btn-results" onclick="window.location.href='/poll-results?token=${pollId}'">View Results</button>
            </div>
          </form>

          <!-- Footer Image -->
          <div class="footer-image">
            <img src="images/Zen-Duck.png" alt="Zen Duck" style="max-width: 320px; border-radius: 12px; border: 3px solid #171717;">
          </div>

          <!-- If You Cannot Attend - Fixed at Bottom -->
          <div class="card card-cannot-attend" style="margin-top: 24px;">
            <h2 style="margin: 0 0 12px 0;">If you cannot attend</h2>
            <p>Please let us know as soon as possible so we can offer the place to someone else.</p>
          </div>
        </div>
      `;

      document.getElementById('app').innerHTML = html;
      setupEventListeners();
    }

    function setupEventListeners() {
      const dateOptions = document.querySelectorAll('.date-option[data-choice^="date"]');
      dateOptions.forEach(option => {
        option.addEventListener('click', (e) => {
          if (e.target.tagName === 'INPUT') return;
          const checkbox = option.querySelector('input[type="checkbox"]');
          checkbox.checked = !checkbox.checked;
          option.classList.toggle('selected');
          handleChoiceChange(checkbox);
        });

        const checkbox = option.querySelector('input[type="checkbox"]');
        checkbox.addEventListener('change', () => {
          option.classList.toggle('selected');
          handleChoiceChange(checkbox);
        });
      });

      document.getElementById('voteForm').addEventListener('submit', submitVote);
    }

    function handleChoiceChange(changedCheckbox) {
      const noneCheckbox = document.getElementById('none');
      const dateCheckboxes = Array.from(document.querySelectorAll('input[value="date1"], input[value="date2"], input[value="date3"]'));

      if (changedCheckbox.value === 'none') {
        if (changedCheckbox.checked) {
          dateCheckboxes.forEach(cb => {
            if (cb.checked) {
              cb.checked = false;
              cb.closest('.date-option').classList.remove('selected');
            }
          });
        }
        toggleBackupMessage(changedCheckbox.checked);
      } else {
        if (changedCheckbox.checked && noneCheckbox.checked) {
          noneCheckbox.checked = false;
          noneCheckbox.closest('.date-option').classList.remove('selected');
          toggleBackupMessage(false);
        }
      }
    }

    function toggleBackupMessage(show) {
      const backupMessage = document.getElementById('backupMessage');
      if (show) {
        backupMessage.classList.add('active');
      } else {
        backupMessage.classList.remove('active');
      }
    }

    function toggleCollapsible(sectionId) {
      const content = document.getElementById(sectionId);
      const header = content.previousElementSibling;
      header.classList.toggle('collapsed');
      content.classList.toggle('hidden');
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
    }

    function startTimer(timerEnd) {
      if (!timerEnd) return;

      function updateTimer() {
        const now = new Date();
        const end = new Date(timerEnd);
        const diff = end - now;

        if (diff <= 0) {
          document.getElementById('timerDisplay').innerHTML = '<div style="font-size: 18px; color: #721c24; font-weight: 700;">Voting has ended</div>';
          document.querySelector('.btn-submit').disabled = true;
          votingEnded = true;
          clearInterval(timerInterval);
          return;
        }

        const hours = Math.floor(diff / 3600000);
        const minutes = Math.floor((diff % 3600000) / 60000);
        const seconds = Math.floor((diff % 60000) / 1000);

        const timerDisplay = document.getElementById('timerDisplay');
        if (timerDisplay) {
          timerDisplay.innerHTML = `
            <div style="font-size: 14px; color: #171717; margin-bottom: 8px;">Time remaining to confirm</div>
            <div style="font-size: 28px; font-weight: 700; color: #171717;">${hours}h ${minutes}m ${seconds}s</div>
          `;
        }

        const paymentTimer = document.getElementById('paymentTimer');
        if (paymentTimer) {
          paymentTimer.innerHTML = `
            <div style="font-size: 12px; color: #171717; margin-bottom: 8px;">Time remaining:</div>
            <div style="font-size: 24px; font-weight: 700; color: ${hours < 1 ? '#dc3545' : '#171717'};">${hours}h ${minutes}m ${seconds}s</div>
          `;
        }
      }

      updateTimer();
      timerInterval = setInterval(updateTimer, 1000);
    }

    async function submitVote(e) {
      e.preventDefault();

      const choices = Array.from(document.querySelectorAll('input[name="choice"]:checked')).map(el => el.value);

      if (choices.length === 0) {
        alert('Please select at least one option');
        return;
      }

      const voterName = document.getElementById('voterName').value;
      const voterEmail = document.getElementById('voterEmail').value;

      try {
        const response = await fetch(`${API_BASE}/vote/${pollId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ voter_name: voterName, voter_email: voterEmail, choices })
        });

        const data = await response.json();

        if (response.ok) {
          document.getElementById('app').innerHTML = `
            <div class="header">
              <h1>✅ Vote recorded!</h1>
              <div class="header-subtitle">Thank you for voting</div>
            </div>
            <div class="content">
              <p class="intro">Your vote has been submitted successfully.</p>
              <div class="button-group">
                <button class="btn-results" onclick="window.location.href='/poll-results?token=${pollId}'">View Results</button>
              </div>
            </div>
          `;
        } else {
          alert(data.error || 'Failed to submit vote');
        }
      } catch (error) {
        alert('Error submitting vote: ' + error.message);
      }
    }

    loadPoll();
  </script>
</body>
</html>
